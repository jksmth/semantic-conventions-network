frr version 10.2
frr defaults traditional
hostname r2
no ipv6 forwarding
!
interface lo
 ip address 10.255.0.2/32
exit
!
router bgp 65002
 bgp router-id 10.255.0.2
 neighbor 172.20.0.11 remote-as 65001
 !
 address-family ipv4 unicast
  network 10.255.0.2/32
  neighbor 172.20.0.11 activate
 exit-address-family
exit
!
line vty
!
