frr version 10.2
frr defaults traditional
hostname r1
no ipv6 forwarding
!
interface lo
 ip address 10.255.0.1/32
exit
!
router bgp 65001
 bgp router-id 10.255.0.1
 neighbor 172.20.0.12 remote-as 65002
 !
 address-family ipv4 unicast
  network 10.255.0.1/32
  neighbor 172.20.0.12 activate
 exit-address-family
exit
!
line vty
!
