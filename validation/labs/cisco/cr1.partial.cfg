! partial config (appended to clab's default mgmt/SSH config)
! SNMPv2c read-only (reachable over the clab management VRF)
snmp-server community public RO
!
! give the data link to the switch an L3 address so it has real oper state
interface Ethernet0/1
 no shutdown
 ip address 192.168.0.1 255.255.255.0
!
