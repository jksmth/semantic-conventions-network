# Minimal net-snmp config: serve SNMPv2c read-only, IF-MIB included by default.
# The listen address is set on the snmpd command line (see Dockerfile), not here,
# because the LinuxKit kernel rejects it when given via agentAddress. sysName is
# the device identity (network.device.id source).
rocommunity public default
sysName r1
sysServices 72
