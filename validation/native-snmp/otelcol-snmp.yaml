# Off-box SNMP poll -> network.* -> OTLP -> weaver live-check.
#
#   snmpreceiver  polls the router's IF-MIB over udp/161  (replaces a custom
#                 SNMP walk parser — the adapter the brief said we'd still own)
#   OTTL          enum-normalizes ifOperStatus -> network.interface.oper.state
#                 (the headline "normalized + native" transform, in real OTTL)
#   otlpexporter  emits real OTLP
#   weaver        conformance + non-zero-on-violation verdict
#
# This is the off-box poll the brief ultimately wants — the collector reaches the
# device over the wire (udp/161), nothing runs on the device but a standard agent.

receivers:
  snmp:
    collection_interval: 5s
    endpoint: udp://${env:SNMP_TARGET}:1161
    version: v2c
    community: public

    # One Resource per interface, keyed by ifName -> network.interface.name.
    resource_attributes:
      network.interface.name:
        oid: "1.3.6.1.2.1.31.1.1.1.1" # IF-MIB::ifName

    attributes:
      network.io.direction:
        enum: [receive, transmit]

    metrics:
      # ifHCInOctets / ifHCOutOctets -> network.interface.io (By, counter),
      # split by network.io.direction. Names are already registry names, so this
      # metric needs no OTTL at all.
      network.interface.io:
        unit: "By"
        sum:
          aggregation: cumulative
          monotonic: true
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.31.1.1.1.6" # ifHCInOctets
            resource_attributes: [network.interface.name]
            attributes:
              - name: network.io.direction
                value: receive
          - oid: "1.3.6.1.2.1.31.1.1.1.10" # ifHCOutOctets
            resource_attributes: [network.interface.name]
            attributes:
              - name: network.io.direction
                value: transmit

      # ifOperStatus (integer 1=up,2=down,3=testing,...) — raw. OTTL below turns
      # the integer into the model's normalized state enum. This is the SNMP
      # equivalent of crosswalk transforms.bgp_state / linux_operstate.
      network.interface.oper.status:
        unit: "1"
        # non-monotonic cumulative sum == OTLP updowncounter (what the model wants)
        sum:
          aggregation: cumulative
          monotonic: false
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.2.2.1.8" # ifOperStatus
            resource_attributes: [network.interface.name]

processors:
  # Device identity (one collector per device), like devices.yaml + the FRR
  # crosswalk device block.
  resource:
    attributes:
      - key: network.device.id
        value: ${env:DEVICE_ID}
        action: upsert
      - key: network.device.type
        value: router
        action: upsert

  # THE ENUM NORMALIZATION, in OTTL. RFC 2863 ifOperStatus integer -> the model's
  # open string enum carried in network.interface.oper.state, value pinned to 1
  # (the up/down "status" metric shape the registry defines).
  transform:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        conditions:
          - metric.name == "network.interface.oper.status"
        statements:
          - set(attributes["network.interface.oper.state"], "up")               where value_int == 1
          - set(attributes["network.interface.oper.state"], "down")             where value_int == 2
          - set(attributes["network.interface.oper.state"], "testing")          where value_int == 3
          - set(attributes["network.interface.oper.state"], "unknown")          where value_int == 4
          - set(attributes["network.interface.oper.state"], "dormant")          where value_int == 5
          - set(attributes["network.interface.oper.state"], "not_present")      where value_int == 6
          - set(attributes["network.interface.oper.state"], "lower_layer_down") where value_int == 7
          # status metric value is always 1; the state rides the attribute.
          - set(value_int, 1)

exporters:
  otlp:
    endpoint: ${env:WEAVER_ENDPOINT}
    tls:
      insecure: true
    compression: none

service:
  telemetry:
    logs:
      level: warn
  pipelines:
    metrics:
      receivers: [snmp]
      processors: [resource, transform]
      exporters: [otlp]
