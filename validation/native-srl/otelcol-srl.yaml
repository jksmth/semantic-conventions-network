# Real NOS (Nokia SR Linux) over its own SNMP server -> network.* -> weaver.
#
# Identical mapping to ../native-snmp/otelcol-snmp.yaml — same IF-MIB OIDs, same
# OTTL enum normalization — but the target is a genuine network OS, not net-snmp.
# That the crosswalk is byte-for-byte the same is the point: SR Linux's IF-MIB is
# just another SNMP source, and the source-agnostic mapping doesn't care.

receivers:
  snmp:
    collection_interval: 5s
    endpoint: udp://${env:SNMP_TARGET}:161 # SR Linux serves SNMP on standard 161
    version: v2c
    community: public

    resource_attributes:
      network.interface.name:
        oid: "1.3.6.1.2.1.31.1.1.1.1" # IF-MIB::ifName -> ethernet-1/1, mgmt0, ...

    attributes:
      network.io.direction:
        enum: [receive, transmit]

    metrics:
      network.interface.io:
        unit: "By"
        sum:
          aggregation: cumulative
          monotonic: true
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.31.1.1.1.6" # ifHCInOctets
            resource_attributes: [network.interface.name]
            attributes:
              - name: network.io.direction
                value: receive
          - oid: "1.3.6.1.2.1.31.1.1.1.10" # ifHCOutOctets
            resource_attributes: [network.interface.name]
            attributes:
              - name: network.io.direction
                value: transmit

      network.interface.oper.status:
        unit: "1"
        sum:
          aggregation: cumulative
          monotonic: false # non-monotonic cumulative sum == updowncounter
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.2.2.1.8" # ifOperStatus (1=up,2=down,...)
            resource_attributes: [network.interface.name]

processors:
  resource:
    attributes:
      - key: network.device.id
        value: ${env:DEVICE_ID}
        action: upsert
      - key: network.device.type
        value: router
        action: upsert
      - key: network.device.vendor.name
        value: nokia
        action: upsert
      - key: os.name
        value: SR Linux
        action: upsert

  transform:
    error_mode: ignore
    metric_statements:
      - context: datapoint
        conditions:
          - metric.name == "network.interface.oper.status"
        statements:
          - set(attributes["network.interface.oper.state"], "up")               where value_int == 1
          - set(attributes["network.interface.oper.state"], "down")             where value_int == 2
          - set(attributes["network.interface.oper.state"], "testing")          where value_int == 3
          - set(attributes["network.interface.oper.state"], "unknown")          where value_int == 4
          - set(attributes["network.interface.oper.state"], "dormant")          where value_int == 5
          - set(attributes["network.interface.oper.state"], "not_present")      where value_int == 6
          - set(attributes["network.interface.oper.state"], "lower_layer_down") where value_int == 7
          - set(value_int, 1)

exporters:
  otlp:
    endpoint: ${env:WEAVER_ENDPOINT}
    tls:
      insecure: true
    compression: none

service:
  telemetry:
    logs:
      level: warn
  pipelines:
    metrics:
      receivers: [snmp]
      processors: [resource, transform]
      exporters: [otlp]
