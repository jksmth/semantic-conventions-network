---
file_format: definition/2

# network-session — the generic stateful-session / connection-table primitive
# (the "session-has-no-home" trio).
#
# Three distinct things the model kept calling a "session" finally get sorted:
#
#   1. PROTOCOL / ADJACENCY session (BGP/OSPF/IS-IS/BFD/LACP/LLDP/PIM) — an
#      adjacency-shaped control-plane peer. HOME: `network.neighbor`.
#      NOT here.
#   2. SUBSCRIBER session (PPPoE/IPoE/L2TP on a BNG) — a subscriber-management
#      object. HOME: `network.access.session.*` as an aggregate NF view.
#      NOT redefined here; the
#      subscriber session is the access-NF *profile* of the generic shape this
#      package establishes (same count+record discipline, same normalized
#      state family).
#   3. CONNECTION / STATE session — a stateful, bidirectional L3/L4
#      connection-table ("conntrack") entry on a firewall/NAT/stateful router
#      (~10⁶ concurrent, transient, its own NEW→ESTABLISHED→CLOSING state
#      machine) — AND an IKE/IPsec Security Association whose
#      interesting state is session-shaped, not adjacency-shaped. These had
#      NO home. THIS package is their home.
#
# Cardinality (the load-bearing rule): a session is **count + record,
# NEVER an entity, NEVER a per-session metric series.** A firewall holds
# millions of connections; a BNG millions of subscriber sessions — modelling
# either as entities or as per-session time-series is the exact schema
# explosion the cardinality firewall exists to prevent. So this package mints
# **no entity**. It defines:
#   - the AGGREGATE session-table load as low-cardinality metrics
#     (concurrent count by state/type, setup-rate, teardown-rate); and
#   - the per-session RECORD (`network.session.closed`, events.yaml) carrying
#     the high-cardinality per-session detail the metrics omit.
# The finite session-table CEILING the count fills toward is the existing
# `network.component.utilization` (`session_table`) resource — referenced,
# not re-minted here; on a firewall this table is the
# resource that exhausts first, well before CPU/RAM (the #1 outage mode).
#
# A session is emphatically NOT a `network.flow` record: a flow Event is a
# *closed observation* of past traffic; a session is a *live, durable, counted
# state object*. And it is NOT a `network.neighbor` (routing-shaped: as.number, peer
# address) — the shoehorn previously applied to PPPoE/IKE.
#
# Per-session RECORD: the core close record is authored as
# `network.session.closed` (events.yaml) — it carries the 5-tuple as the reused
# upstream `source.*` / `destination.*` + `network.transport` + `network.type`
# attributes, the `network.session.type`
# and verbatim `native_state`, plus `network.session.id` and
# `network.session.close.reason`. The symmetric session-at-open record is its
# deferred sibling. The firewall enrichment — the matched security
# rule, the from/to `network.zone`, and the NAT binding (the `network-firewall`
# zone/policy/NAT objects) — is deferred with that plane. For
# an IPsec SA the record carries the protecting `network.tunnel.id`. For a
# subscriber session the access identity (`network.access.subscriber.id` /
# `circuit.id` / `session.type`) — but that record is the AAA/mediation
# system's, not this package's.
#
# Prior art: netfilter/conntrack & PF/IPFIX session export; RFC 7296 (IKEv2),
# RFC 4301/4303 (IPsec SA/ESP); the firewall stateful-inspection model
# (Checkpoint/PAN-OS/Junos SRX session tables); RFC 793 (TCP states).

attributes:
# --- Classification ----------------------------------------------------
- key: network.session.type
  type:
    members:
    - id: connection
      value: "connection"
      brief: >
        A stateful L3/L4 connection-table ("conntrack") entry on a firewall, NAT device, or stateful router — a bidirectional flow with its own lifecycle. The L4 protocol is the reused upstream `network.transport` (`tcp`/`udp`/…), not a value here.
      stability: development
    - id: ipsec_sa
      value: "ipsec_sa"
      brief: >
        An IPsec Security Association (Child SA, ESP/AH) — the negotiated, rekeyed data-plane SA. The overlay endpoint it protects is `network.tunnel` (`type=ipsec`); this is its session/SA lifecycle.
      stability: development
    - id: ike_sa
      value: "ike_sa"
      brief: >
        An IKE / ISAKMP SA (IKEv1/IKEv2) — the control SA that negotiates and rekeys the IPsec SAs.
      stability: development
  stability: development
  brief: >
    The kind of stateful session counted by the session-table metrics.
  note: |
    Open enum, lowercase, custom values MAY be used. This package owns the
    senses that had no home; the other two senses of "session" route
    elsewhere and are NOT given values here:

    - adjacency/protocol sessions (BGP, OSPF, IS-IS, BFD, LACP, LLDP, PIM,
      LDP, RSVP) → `network.neighbor` + `network.neighbor.protocol`;
    - subscriber sessions (PPPoE/IPoE/L2TP) → `network.access.session.type`,
      as the NF-local aggregate — the same generic shape this
      package defines, profiled for the subscriber edge.

# --- State (normalized + native; lifecycle-adapted) ----
- key: network.session.state
  type:
    members:
    - id: connecting
      value: "connecting"
      brief: >
        Mid-establishment: the session is forming and not yet usable — a TCP/UDP connection in `NEW`/handshake, or an IKE/IPsec SA being negotiated.
      stability: development
    - id: up
      value: "up"
      brief: >
        Established and active — a connection in `ESTABLISHED`, or an installed/active IPsec or IKE SA.
      stability: development
    - id: closing
      value: "closing"
      brief: >
        Gracefully tearing down — TCP `FIN_WAIT`/`CLOSING`/`TIME_WAIT`, or an SA being deleted/rekeyed out. A meaningful state the coarse `up`/`down` pair loses, so it is kept.
      stability: development
    - id: down
      value: "down"
      brief: >
        Closed, failed, or denied — a connection refused/reset/dropped by policy, or an expired/failed SA.
      stability: development
    - id: unknown
      value: "unknown"
      brief: State cannot be determined.
      stability: development
  stability: development
  brief: >
    The normalized, cross-type lifecycle state of a stateful session, used to bucket the aggregate session count.
  note: >
    The coarse value in the "normalized + native" pattern (README §State Modelling, Principle 10; the vocabulary family adapted from the adjacency lifecycle to the bidirectional-connection/SA lifecycle — `up` and `down` shared, `connecting` shared, `closing` added for the graceful teardown phase a connection/SA has and an adjacency does not). The same family `network.access.session.state` uses for subscriber sessions (which spells the teardown phase `terminating`). A low-cardinality dimension on `network.session.count`, never a per-session series.

- key: network.session.native_state
  type: string
  stability: development
  brief: >
    The verbatim, protocol-/vendor-native session state string, preserved alongside the normalized `network.session.state`.
  note: >
    The exact term as reported by the device — e.g. a TCP state (`ESTABLISHED`, `TIME_WAIT`), a netfilter conntrack state, or an IKE/IPsec SA state (`ESTABLISHED`, `REKEYING`, `DELETING`). Carries the fidelity the normalized enum deliberately discards. Record/per-session level (the cardinality firewall keeps it off metric series).
  examples: ["ESTABLISHED", "TIME_WAIT", "SYN_SENT", "REKEYING", "DELETING"]

# --- Record-only identity & close reason -------------------------------
# Per-session, high-cardinality fields that live ONLY on the session record
# (the cardinality firewall keeps them off every metric series).
- key: network.session.id
  type: string
  stability: development
  brief: >
    A per-session identifier assigned by the device that holds the table — the conntrack/flow id, firewall session id, or SA reference.
  note: >
    Record-level only (NEVER a metric dimension — millions of values). Opaque and device-scoped; it joins the open and close records for the same session and correlates a session to its flow records. NOT the reused 5-tuple (that is `source.*`/`destination.*` + `network.transport`); this is the device's own table handle.
  examples: ["sess-7f3a91", "0x00ff2c", "conntrack-148293"]

- key: network.session.close.reason
  type:
    members:
    - id: normal
      value: "normal"
      brief: >
        Graceful close — TCP FIN/FIN-ACK teardown, or an SA deleted on normal expiry/rekey.
      stability: development
    - id: idle_timeout
      value: "idle_timeout"
      brief: >
        Removed by the idle/inactivity timer — no traffic within the session's idle timeout. The most common conntrack removal.
      stability: development
    - id: policy
      value: "policy"
      brief: >
        Closed by policy — a security rule denied/blocked the connection, or an operator/automation cleared it.
      stability: development
    - id: reset
      value: "reset"
      brief: >
        Abnormally reset — TCP RST from an endpoint, or the device tore the connection down with a reset.
      stability: development
    - id: error
      value: "error"
      brief: >
        Removed due to a fault — table exhaustion eviction, SA negotiation failure, or other error path.
      stability: development
    - id: unknown
      value: "unknown"
      brief: The close reason could not be determined.
      stability: development
  stability: development
  brief: >
    Why the session left the table — the per-session counterpart of the aggregate `network.session.teardowns` counter.
  note: >
    Open enum, lowercase, custom values MAY be used. Record-level only. The single most useful field on the close record: it separates a healthy `normal`/`idle_timeout` churn from the `reset`/`policy`/`error` removals an operator investigates. Distinct from `network.session.native_state`, which carries the verbatim final state string (e.g. `TIME_WAIT`).
  examples: ["normal", "idle_timeout", "reset", "policy"]
