---
file_format: definition/2

# network-wifi — the IEEE 802.11 radio / BSS model and the RF PHY telemetry
# regime (the radio analogue of network.optical.*).
#
# Scope: the WiFi-specific objects and signals that make a device "wireless".
# Most of the WiFi story REUSES already-ratified primitives and is NOT
# redefined here:
#   - The AP is a network.device (type=access_point); the WLC is a
#     network.device (type=controller). In a controller-based (split-MAC /
#     CAPWAP) or cloud-managed WLAN the controller is network.observer and the
#     AP is the subject — producer≠subject, the general observer model,
#     with collection.method=capwap (added to the observer
#     enum). A self-reporting all-in-one gateway is producer=subject (observer
#     absent); the radio/BSS telemetry below is IDENTICAL either way
#     (producer-agnostic). No WiFi-specific producer≠subject
#     machinery, and NO per-technology controller id — "which WLC
#     serves this AP" is network.observer.id.
#   - The 1:N RF cell (one BSS ↔ many stations) is the authored network.link
#     with topology=point_to_multipoint, whose network.link.id IS the BSSID.
#     The BSS entity below is the head-end (local) of that
#     link; stations attach by reference, not as entities (see the station note).
#
# Producer-agnostic RF: radio/BSS telemetry is the
# same content whether self-emitted by a home gateway or relayed by a WLC. Only
# network.observer.id / collection.method differ.
#
# hw boundary: the radio/AP hardware is a hw.*
# FRU — radio temperature, AP PoE power draw, module status/voltage → hw.*, NOT
# redefined here. network.wifi.* carries only the RF SIGNAL and the WiFi
# control-plane objects hw.* / network.interface have no concept of.
#
# Deferred (not ignored), and MUST NOT reshape this package:
#   - Wireless EVENTS (associate/disassociate/roam, DFS radar, RRM channel/power
#     change, rogue/interference) → the shared event-envelope package; the roam
#     event is designed jointly with the MAC-move family (network.l2.mac.moved)
#     as "identity X changed attachment point".
#   - The ESS/SSID as a first-class entity (it spans many BSSes across many APs,
#     not device-scoped) — carried as the network.wifi.bss.ssid descriptor for
#     now (cf. deferring the ODN/splitter object while shipping network.pon.id).
#   - Client-side RADIUS/802.1X (the WLC as a NAS) — the same AAA-dependency
#     scope as the BNG, shared with network-access, not WiFi-specific.
#   - The CAPWAP data tunnel as network.tunnel — only if a use case needs it.
#
# Prior art: TR-181 Device.WiFi (Radio / SSID / AccessPoint / AssociatedDevice
# / EndPoint), openconfig-wifi (ap-manager / mac / phy / ssid), IEEE 802.11.

attributes:
# ======================================================================
# Radio — the RF carrier/PHY (the network.optical.channel analogue)
# ======================================================================
- key: network.wifi.radio.id
  type: string
  stability: development
  brief: >
    Identifier of the radio (a PHY on one band), unique within the device.
  note: |
    Full identity is the pair (`network.device.id`, `network.wifi.radio.id`)
    — a sub-entity scoped by its owning device. The radio is the
    RF-signal entity (the analogue of `network.optical.channel`):
    the radio *hardware* is a `hw.*` FRU referenced by `hw.id`, the L2/
    forwarding view (when present) is a `network.interface` (`type=radio`)
    referenced by `network.interface.name`, and `network.wifi.radio.*` carries
    only the RF signal those cannot express.

    A radio hosts one or more BSSes (`network.wifi.bss`, related by
    `network.wifi.radio.id`).
  examples: ["radio0", "phy0", "wifi0-5g"]

- key: network.wifi.radio.band
  type:
    members:
    - id: band_2_4ghz
      value: "2.4ghz"
      brief: The 2.4 GHz band (802.11b/g/n/ax).
      stability: development
    - id: band_5ghz
      value: "5ghz"
      brief: The 5 GHz band (802.11a/n/ac/ax).
      stability: development
    - id: band_6ghz
      value: "6ghz"
      brief: The 6 GHz band (802.11ax / WiFi-6E, 802.11be).
      stability: development
    - id: band_60ghz
      value: "60ghz"
      brief: The 60 GHz band (802.11ad/ay).
      stability: development
  stability: development
  brief: The frequency band the radio operates on.
  note: >
    Open enum, lowercase. A radio operates on exactly one band at a time; a tri-band AP has three radios (three `network.wifi.radio` entities).

- key: network.wifi.radio.channel
  type: int
  stability: development
  brief: The channel number the radio is currently tuned to.
  note: >
    The 802.11 channel index within `network.wifi.radio.band` (e.g. ch 6 on 2.4 GHz, ch 44 on 5 GHz, ch 37 on 6 GHz). RRM-managed and can change at runtime (an RRM/DFS channel change is a deferred event); the runtime value can also be tracked as a gauge under the same name.
  examples: [6, 44, 37]

- key: network.wifi.radio.channel.width
  type: int
  stability: development
  brief: The channel width in MHz.
  note: >
    The bonded channel width (20/40/80/160/320 MHz). 320 MHz is 802.11be (WiFi 7).
  examples: [20, 80, 160]

- key: network.wifi.radio.standard
  type: string
  stability: development
  brief: >
    The highest 802.11 generation the radio is operating with (open enum).
  note: >
    Well-known values (lowercase): `802.11a`, `802.11b`, `802.11g`, `802.11n` (WiFi 4), `802.11ac` (WiFi 5), `802.11ax` (WiFi 6/6E), `802.11be` (WiFi 7). Custom values MAY be used.
  examples: ["802.11ax", "802.11be"]

- key: network.wifi.radio.mode
  type: string[]
  stability: development
  brief: >
    The operating mode(s) of the radio — what role it plays on the air.
  note: |
    Multi-valued because one radio can serve two roles at once: on a mesh
    node a single radio is commonly an access point for clients AND a mesh/
    station backhaul leg simultaneously. Well-known values (lowercase):

    - `ap`      — serving clients (infrastructure BSS). The default.
    - `sta`     — a station/client on someone else's AP (the device's WiFi
                  uplink: travel router, WISP CPE, 4G/5G WiFi failover,
                  mesh backhaul leg). The STA's upstream association is
                  expressed by membership-by-reference: the device carries
                  the upstream BSS's `network.link.id` (= the upstream
                  BSSID), exactly as a PON ONU carries `network.pon.id`.
                  Its own uplink RSSI/SNR/rate are
                  self-reported `network.wifi.radio.*` (producer=subject).
    - `mesh`    — an 802.11s / EasyMesh backhaul radio.
    - `monitor` — passive capture / sensor (no association).
    - `sensor`  — dedicated RF scanning / WIPS.

    Answers the most basic wireless question — "am I serving clients or am I
    a client?" — that no prior attribute could. Open enum.
  examples: [["ap"], ["ap", "mesh"], ["sta"]]

# --- Channel/airtime utilisation dimension -----------------------------
- key: network.wifi.airtime.type
  type:
    members:
    - id: busy
      value: "busy"
      brief: >
        Total channel-busy fraction (the overall "how busy is this channel" number).
      stability: development
    - id: tx
      value: "tx"
      brief: Airtime spent transmitting (this radio's own Tx).
      stability: development
    - id: rx
      value: "rx"
      brief: Airtime spent receiving in-network (decodable 802.11) traffic.
      stability: development
    - id: interference
      value: "interference"
      brief: >
        Airtime lost to non-WiFi energy / undecodable co-channel interference (microwave, radar, adjacent BSS).
      stability: development
  stability: development
  brief: >
    The airtime category for `network.wifi.radio.airtime.utilization`.
  note: >
    Open enum, lowercase. `busy` is the overall figure; `tx`/`rx`/ `interference` decompose it.

# ======================================================================
# BSS — the virtual-AP, and the head-end of the point-to-multipoint cell
# ======================================================================
- key: network.wifi.bss.bssid
  type: string
  stability: development
  brief: >
    The BSSID (a MAC address) identifying the BSS, unique within the device.
  note: |
    Full identity is the pair (`network.device.id`,
    `network.wifi.bss.bssid`) — a sub-entity scoped by its owning AP.
    The BSS is one SSID on one radio (a "virtual AP").

    The BSSID is ALSO the `network.link.id` of the `point_to_multipoint`
    `network.link` that models the RF cell: the AP is the
    head-end (`network.link.local.device.id`), and each associated station
    attaches by carrying this same id. Normalized to lowercase
    colon-separated form.
  examples: ["a1:b2:c3:d4:e5:00", "a1:b2:c3:d4:e5:01"]

- key: network.wifi.bss.ssid
  type: string
  stability: development
  brief: The SSID (network name) this BSS advertises.
  note: >
    The human-readable network name. The ESS (the SSID as it spans many BSSes across many APs) is not a first-class entity today (resist proliferation) — this descriptor carries the network-name grouping.
  examples: ["Corp", "Guest", "IoT"]

- key: network.wifi.bss.security
  type:
    members:
    - id: open
      value: "open"
      brief: No authentication / no encryption.
      stability: development
    - id: owe
      value: "owe"
      brief: Opportunistic Wireless Encryption (enhanced open).
      stability: development
    - id: wpa2_personal
      value: "wpa2_personal"
      brief: WPA2-Personal (PSK).
      stability: development
    - id: wpa2_enterprise
      value: "wpa2_enterprise"
      brief: WPA2-Enterprise (802.1X/EAP).
      stability: development
    - id: wpa3_personal
      value: "wpa3_personal"
      brief: WPA3-Personal (SAE).
      stability: development
    - id: wpa3_enterprise
      value: "wpa3_enterprise"
      brief: WPA3-Enterprise (802.1X/EAP).
      stability: development
  stability: development
  brief: The security/authentication mode of the BSS.
  note: >
    Open enum, lowercase. Enterprise modes make the WLC/AP a RADIUS NAS; the client-side AAA dependency view is deferred to network-access, not modelled here.

- key: network.wifi.bss.vlan
  type: int
  stability: development
  brief: >
    The VLAN id this BSS/SSID bridges its clients into.
  note: >
    The SSID→VLAN binding ("this BSS drops clients into VLAN 10") — the WiFi instance of the port↔VLAN membership pattern, carried as a config attribute on the entity exactly as switchport VLAN membership is carried on `network.interface`.
  examples: [10, 20, 30]

# ======================================================================
# AP control plane — the join / CAPWAP state machine
# ======================================================================
- key: network.wifi.ap.state
  type:
    members:
    - id: discovering
      value: "discovering"
      brief: The AP is discovering a controller (CAPWAP discovery).
      stability: development
    - id: joining
      value: "joining"
      brief: >
        The AP is joining / authenticating to the controller (CAPWAP join).
      stability: development
    - id: downloading
      value: "downloading"
      brief: The AP is downloading image/config from the controller.
      stability: development
    - id: run
      value: "run"
      brief: The AP is joined and serving clients (CAPWAP run state).
      stability: development
    - id: disconnected
      value: "disconnected"
      brief: The AP has lost its controller association.
      stability: development
    - id: unknown
      value: "unknown"
      brief: State cannot be determined.
      stability: development
  stability: development
  brief: The AP's controller-join (CAPWAP) state.
  note: >
    A dedicated enum, not the coarse `network.neighbor.state`: `joining`/`downloading` carry meaning `up`/`down` would lose. The direct analogue of the PON ONU activation state machine (`network.pon.onu.state`). Controller-observed (the WLC is `network.observer`, `collection.method=capwap`); on a self-reporting (autonomous/cloud-managed) AP the value is self-emitted. The verbatim vendor term is `network.wifi.ap.native_state`. The join/leave transition *event* is deferred to the events package.

- key: network.wifi.ap.native_state
  type: string
  stability: development
  brief: The verbatim, vendor-native AP controller-state string.
  examples: ["Run", "Image Download", "Join", "Maintenance"]

# ======================================================================
# Mesh — the node role for multi-hop self-forming backhaul
# ======================================================================
- key: network.wifi.mesh.node.role
  type:
    members:
    - id: gateway
      value: "gateway"
      brief: >
        The root node with the wired uplink to the rest of the network (the mesh portal's path to the internet).
      stability: development
    - id: mesh_ap
      value: "mesh_ap"
      brief: >
        A satellite node serving clients and backhauling to its parent over a wireless mesh link.
      stability: development
    - id: portal
      value: "portal"
      brief: >
        A mesh portal bridging the 802.11s mesh to a wired LAN segment.
      stability: development
  stability: development
  brief: The node's role in a multi-hop wireless mesh.
  note: |
    The only genuinely-new descriptor for mesh. The mesh topology
    itself composes from authored primitives, no new entity:
    - each wireless backhaul hop is a `network.link` (`type=physical`,
      `topology=point_to_point` for a single backhaul, or
      `point_to_multipoint` for a PtMP sector). Per-link RF quality lives on
      the `network.wifi.radio` at each end (a `network.link` carries no
      metrics);
    - the multi-hop path to the gateway is a `network.path`:
      each hop carries the shared `network.path.id` and `network.path.role`
      orders the hops toward the root; a re-parent is a path-change event.

    This is the first multi-hop self-forming topology in the model but it
    does not block — it is
    `network.link` + `network.path` + this role attribute. Open enum.

# ======================================================================
# Station — count + record, NEVER an entity.
# The attributes below are RECORD/EVENT fields (per-station detail rides
# records/events — deferred package), never high-cardinality metric
# dimensions (the cardinality firewall). Defined here so the deferred
# events package and any sampled record have a vocabulary. The aggregate
# station COUNT is the metric `network.wifi.bss.station.count`.
# ======================================================================
- key: network.wifi.station.mac
  type: string
  stability: development
  brief: >
    The MAC address of an associated station (client), as seen by the AP.
  note: |
    A RECORD/EVENT field only. A station is transient (associates, roams,
    idles out in minutes), MAC-RANDOMISED by design (modern clients rotate
    MAC per SSID/visit — the identifier is deliberately unstable, the
    opposite of a stable-id contract, so entity resolution is NOT
    attempted), and numerous (thousands per WLC). By the count/record/entity
    trichotomy it is therefore count+record, never an entity. MUST NOT be
    used as a metric dimension. Normalized to lowercase colon-separated form.
  examples: ["3a:1f:55:90:ab:cd"]

- key: network.wifi.station.previous_bss.bssid
  type: string
  stability: development
  brief: >
    For a `network.wifi.station.roamed` record: the BSSID the station was associated with BEFORE the roam. The current BSS is the reused `network.wifi.bss.bssid`.
  note: >
    The previous-locator half of the wireless move record, so "station X roamed from BSS A to BSS B" is fully expressed — the RF sibling of `network.l2.mac.previous_interface.name` / `network.evpn.previous_esi`. Lowercase colon-separated form. Record/event field only, never a metric dimension.
  examples: ["00:11:22:aa:bb:00"]

- key: network.wifi.station.rssi
  type: int
  stability: development
  brief: >
    The received signal strength of a station as measured at the AP, in dBm.
  note: >
    A RECORD/EVENT field (per-station, transient — see `network.wifi.station.mac`). The per-client analogue of optical Rx power and of PON per-ONU burst RSSI (`network.pon.onu.rssi`). Unit `dB[mW]` (UCUM) — `dB[mW]` IS dBm, the same note that serves optical engineers now serves RF engineers. Never a metric dimension.
  examples: [-55, -72]

- key: network.wifi.station.snr
  type: int
  stability: development
  brief: The signal-to-noise ratio of a station's link, in dB.
  note: >
    A RECORD/EVENT field (per-station, transient). Unit `dB`.
  examples: [35, 18]
