---
file_format: definition/2
metrics:
# ======================================================================
# RF PHY telemetry — the radio analogue of network.optical.*.
# The genuinely new regime: the model's only prior signal-quality domain
# was fiber-optical. Associates with network.wifi.radio.
# ======================================================================
- name: network.wifi.radio.transmit_power
  stability: development
  brief: The radio's transmit power.
  note: >
    The RRM-managed (or statically configured) transmit power. Unit `dB[mW]`
    (UCUM) — `dB[mW]` IS dBm. Named `transmit_power` after the industry term
    (OpenConfig `transmit-power`, TR-181 `TransmitPower`), not `tx_power`: a
    radio's transmit power is a single value with no same-quantity receive
    counterpart to fold under `network.io.direction`, and the received-signal
    side is the separately-named `network.wifi.radio.rssi`. The asymmetric
    `transmit_power` / `rssi` pair is the universal RF convention (there is no
    `rx_power`). Distinct from the bidirectional endpoint `network.optical.power`,
    whose Tx/Rx are one quantity measured at both fibre ends and so use
    `network.io.direction`.
  instrument: gauge
  unit: "dB[mW]"
  entity_associations:
  - network.wifi.radio

- name: network.wifi.radio.noise_floor
  stability: development
  brief: The ambient RF noise floor measured by the radio.
  note: >
    The background noise level on the radio's current channel — the denominator behind every station's SNR. Unit `dB[mW]` (UCUM; dBm). A rising noise floor is the "something is jamming this channel" signal.
  instrument: gauge
  unit: "dB[mW]"
  entity_associations:
  - network.wifi.radio

- name: network.wifi.radio.airtime.utilization
  stability: development
  brief: >
    The fraction of airtime the channel is occupied, by category.
  note: |
    THE WiFi capacity metric — the radio analogue of link utilisation
    ("the 2.4 GHz band in the atrium is 90% busy"). A radio on a shared-RF
    medium is capacity-bound by airtime, not bit-rate. `network.wifi.airtime.type`
    decomposes it: `busy` (the overall total), `tx`/`rx` (this radio's own
    transmit/receive), and `interference` (non-WiFi energy / undecodable
    co-channel). Unit `1` (a ratio in [0,1]).
  instrument: gauge
  unit: "1"
  attributes:
  - ref: network.wifi.airtime.type
    requirement_level: required
  entity_associations:
  - network.wifi.radio

- name: network.wifi.radio.retries
  stability: development
  brief: Frames retransmitted by the radio due to RF conditions.
  note: >
    802.11 RF retransmissions — distinct from `network.interface.errors` (which counts frame errors, not RF retries). A rising retry rate is an early RF-degradation / contention signal. `network.io.direction` separates Tx retries from received-retry frames.
  instrument: counter
  unit: "{frame}"
  attributes:
  - ref: network.io.direction
    requirement_level: opt_in
  entity_associations:
  - network.wifi.radio

# --- STA/mesh-mode self-uplink signal ----------------------------------
# The device's OWN measured uplink signal to the upstream AP when a radio
# is in sta/mesh mode (WiFi-WAN / WISP CPE / mesh backhaul leg). Producer =
# subject (self-reported) — the radio.mode note already promises these live
# on network.wifi.radio.*. This is a single bounded per-radio value, UNLIKE
# the AP-side per-station RSSI/SNR (numerous, transient → record fields,
# the cardinality firewall). The RF twin of network.optical.power /
# network.optical.osnr at the receiving endpoint.
- name: network.wifi.radio.rssi
  stability: development
  brief: >
    Received signal strength of the radio's own upstream association (sta/mesh mode).
  note: >
    The self-measured received signal level from the upstream AP — the WISP-CPE / mesh-backhaul "how strong is my uplink" number, the #1 health signal for a WiFi-WAN leg, which had no radio-level home before. Applies only when `network.wifi.radio.mode` includes `sta` or `mesh` (a pure `ap` radio has no single upstream to measure — its per-station RSSI is a record field, not this metric). Unit `dB[mW]` (UCUM; dBm), as `network.wifi.radio.transmit_power` and the endpoint `network.optical.power`.
  instrument: gauge
  unit: "dB[mW]"
  entity_associations:
  - network.wifi.radio

- name: network.wifi.radio.snr
  stability: development
  brief: >
    Signal-to-noise ratio of the radio's own upstream association (sta/mesh mode).
  note: >
    The self-measured SNR of the uplink to the upstream AP (RSSI above the `network.wifi.radio.noise_floor`) — the cleaner link-quality figure behind the raw RSSI. Applies only when `network.wifi.radio.mode` includes `sta` or `mesh`. Unit `dB` (a ratio), not `dB[mW]` — the RF twin of `network.optical.osnr`.
  instrument: gauge
  unit: "dB"
  entity_associations:
  - network.wifi.radio

# ======================================================================
# BSS aggregates — the station COUNT (stations are count+record, never
# entities). Associates with network.wifi.bss.
# ======================================================================
- name: network.wifi.bss.station.count
  stability: development
  brief: >
    The number of stations currently associated to the BSS.
  note: |
    The aggregate associated-client count — "how many clients are on this
    BSS/AP", the first question any WLAN operator asks. Stations are NOT
    entities (transient, MAC-randomised, numerous); this bounded,
    low-cardinality count is how they are measured, with per-station detail
    riding records/events (the cardinality firewall). Compared with
    the radio's per-band max-client ceiling this is the association-table-fill
    signal — a dense cell (lecture hall, stadium) exhausts the
    table while CPU looks idle.
  instrument: updowncounter
  unit: "{station}"
  entity_associations:
  - network.wifi.bss

# ======================================================================
# AP control plane — the join/CAPWAP state machine
# (mirroring network.pon.onu.state). Associates with network.device.
# ======================================================================
- name: network.wifi.ap.state
  stability: development
  brief: >
    The AP's current controller-join (CAPWAP) state (enum-as-attribute status metric — UpDownCounter, per the OTel status-metrics guide).
  note: |
    The K8s `status.phase` pattern (as used for `network.pon.onu.state`,
    STP, and interface state): one series per possible
    `network.wifi.ap.state` value, value 1 for the AP's current state.
    `network.wifi.ap.native_state` carries the verbatim vendor term. The
    state machine (discovering→joining→downloading→run) is the WiFi analogue
    of ONU activation; on a controller-based WLAN the WLC is
    `network.observer` (`collection.method=capwap`), on an autonomous/
    cloud-managed AP it is self-reported.

    The join/leave transition *event* is deferred to the events package.
  instrument: updowncounter
  unit: "1"
  attributes:
  - ref: network.wifi.ap.state
    requirement_level: required
  - ref: network.wifi.ap.native_state
    requirement_level: opt_in
  entity_associations:
  - network.device
