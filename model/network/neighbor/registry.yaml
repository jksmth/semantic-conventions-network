---
file_format: definition/2

# network-neighbor — the generic control-plane adjacency/session peer.
#
# Covers BGP peers, OSPF/IS-IS neighbours, BFD sessions, LACP partners,
# LLDP neighbours, and PIM neighbours with one entity, per the README
# "generic neighbour" model. The naming of `network.neighbor.protocol`
# (vs upstream L7 `network.protocol.name`) keeps the control-plane
# protocol key distinct from the app-layer key.
# See docs/conventions.md (naming rules).
#
# Shared attributes ref'd from network-common:
#   - network.neighbor.state          (normalized health enum)
#   - network.neighbor.native_state   (verbatim term)
#   - network.address_family          (AFI/SAFI)
#
# Out of scope for now (deferred to a future network-session
# package): session-style protocols whose interesting state is *not*
# adjacency-shaped — PPPoE/PPP (AC-name, MRU, session-id), IKE/IPsec SAs,
# and BNG subscriber sessions. They may be represented coarsely here via
# `state`/`native_state`, but their session-specific attributes are not
# modelled on `network.neighbor`.

attributes:
# --- Identity ----------------------------------------------------------
- key: network.neighbor.id
  type: string
  stability: development
  brief: >
    Identifier of the neighbour/peer, unique within the device for a given protocol.
  note: |
    Full identity is the tuple (`network.device.id`,
    `network.neighbor.protocol`, `network.neighbor.id`) — the owning
    `network.device` is expected in the same Resource, and
    `protocol` disambiguates the common case of the *same* peer being
    both a BGP and a BFD neighbour.

    SHOULD be the most stable peer identifier the protocol provides:
    the BGP/OSPF router-id, the IS-IS system-id, the LLDP chassis-id,
    or the peer address where no router-id exists. Mutable transport
    details (e.g. a peer's current source port) MUST NOT be used.
  examples: ["192.0.2.7", "10.0.0.1", "0000.0c00.1234", "65001:192.0.2.7"]

- key: network.neighbor.protocol
  type:
    members:
    - id: bgp
      value: "bgp"
      brief: Border Gateway Protocol peer.
      stability: development
    - id: ospf
      value: "ospf"
      brief: OSPFv2 neighbour.
      stability: development
    - id: ospfv3
      value: "ospfv3"
      brief: OSPFv3 neighbour.
      stability: development
    - id: isis
      value: "isis"
      brief: IS-IS adjacency.
      stability: development
    - id: eigrp
      value: "eigrp"
      brief: >
        EIGRP neighbour. EIGRP is IETF RFC 7868 — a normalized, standard protocol value, not a vendor name.
      stability: development
    - id: bfd
      value: "bfd"
      brief: Bidirectional Forwarding Detection session.
      stability: development
    - id: lacp
      value: "lacp"
      brief: LACP partner (the link-aggregation control peer).
      stability: development
    - id: lldp
      value: "lldp"
      brief: LLDP neighbour (discovered link-layer peer).
      stability: development
    - id: cdp
      value: "cdp"
      brief: >
        CDP neighbour — Cisco Discovery Protocol, the proprietary sibling of LLDP; mirrors `cdp` on `network.link.discovery.protocol`.
      stability: development
    - id: pim
      value: "pim"
      brief: PIM neighbour.
      stability: development
    - id: ldp
      value: "ldp"
      brief: MPLS LDP peer.
      stability: development
    - id: rsvp
      value: "rsvp"
      brief: RSVP-TE neighbour.
      stability: development
    - id: msdp
      value: "msdp"
      brief: MSDP peer.
      stability: development
  stability: development
  brief: >
    The control-plane protocol that forms this adjacency/session.
  note: |
    This is a distinct key from the upstream, Stable, L7-scoped
    `network.protocol.name` (`http`, `amqp`, …), which MUST NOT be
    overloaded with control-plane protocols.
    See docs/conventions.md (naming rules).

    An open enum with a registered well-known value set; values
    normalized to lowercase, custom values MAY be used. `evpn` and
    `vxlan` are NOT values here — EVPN is `bgp` with
    `network.address_family=l2vpn_evpn`; VXLAN is encapsulation.

    Genuinely proprietary protocols take a normalized well-known value
    when one is broadly understood (e.g. `cdp`, a future `omp`). Any
    proprietary internals with no neutral equivalent live under a
    top-level vendor namespace keyed by `network.device.vendor.name`
    (OTel system-specific naming — e.g. `cisco.cdp.*`), NOT a
    `network.vendor.*` infix. A once-proprietary protocol that has since
    been standardized (EIGRP is now IETF RFC 7868) instead refines the
    core signal under its protocol-qualified namespace
    (`network.neighbor.eigrp.*`), gated on `protocol=eigrp`.

# --- Peer descriptors --------------------------------------------------
- key: network.neighbor.address
  type: string
  stability: development
  brief: >
    The network address of the neighbour/peer (typically the peer's IP address).
  note: >
    The transport/peering address. May equal `network.neighbor.id` when the protocol has no separate router-/system-id.

    Deliberately NOT the upstream `network.peer.address`: that attribute is the peer of a single network *connection* and fits only socket-based neighbours (BGP/BFD over TCP/UDP). A `network.neighbor` is protocol-agnostic — OSPF runs over IP multicast, IS-IS/LLDP/LACP over L2 with no IP socket — so a dedicated, uniform neighbour-address attribute is used instead.
  examples: ["192.0.2.7", "2001:db8::7", "fe80::1"]

- key: network.neighbor.as.number
  type: int
  stability: development
  brief: >
    The peer's Autonomous System number (BGP).
  note: >
    Recommended for BGP neighbours; absent for IGP/link-layer neighbours. 4-byte ASNs are represented as their integer value. Uses the `as.number`/`as.name` spelling shared across the model (the observed `source.as.*`/`destination.as.*` enrichment and ECS/semconv #3740) rather than a bespoke `asn` — the peer's CONFIGURED AS on a control-plane adjacency, the Axis-1 self-telemetry counterpart of the Axis-2 observed `destination.as.number`.
  examples: [65001, 64512, 4200000000]

- key: network.neighbor.as.name
  type: string
  stability: development
  brief: >
    The human-readable name/organization of the peer's Autonomous System (BGP).
  note: >
    Optional display companion to `network.neighbor.as.number`; prefer the number for matching. Mirrors `source.as.name`/`destination.as.name` and ECS.
  examples: ["EXAMPLE-AS", "GOOGLE"]

# --- Protocol message classification (metric dimension) ----------------
- key: network.protocol.message.type
  type: string
  stability: development
  brief: >
    The protocol message type counted by `network.protocol.messages`.
  note: |
    An open string scoped to the `network.neighbor.protocol` in context.
    Well-known examples by protocol:

    - BGP: `open`, `update`, `keepalive`, `notification`, `route_refresh`
    - OSPF: `hello`, `dbd`, `ls_request`, `ls_update`, `ls_ack`
    - IS-IS: `hello`, `lsp`, `csnp`, `psnp`
    - LDP: `hello`, `initialization`, `keepalive`, `label_mapping`
    - EIGRP: `hello`, `update`, `query`, `reply`, `ack`, `sia_query`, `sia_reply`
    - LACP: `lacpdu`, `marker`, `marker_response` (IEEE 802.1AX slow-protocol
      PDUs — `ieee802-dot1ax` `aggregation-port-stats/{lacp,marker,marker-response}-pdu-{rx,tx}`;
      `dot3adAggPortStatsLACPDUs*`/`MarkerPDUs*`/`MarkerResponsePDUs*`)

    This is NOT the upstream L7 `network.protocol.name`; it
    classifies control-plane PDUs.
  examples: ["update", "keepalive", "hello", "notification", "lsp", "lacpdu"]

# --- LACP refinement (protocol-qualified; gated on protocol=lacp) -------
# LACP is wholly IEEE 802.1AX. Its PDU/error counters fold onto the generic
# network.protocol.messages/errors above (message.type=lacpdu/marker/
# marker_response; error.type=unknown/illegal). The two facets below have NO
# vendor-neutral neighbour equivalent, so they refine the core signal under the
# protocol-qualified `network.neighbor.lacp.*` namespace (the network.neighbor.eigrp.*
# precedent), gated on network.neighbor.protocol=lacp.
- key: network.neighbor.lacp.role
  type:
    members:
    - id: actor
      value: "actor"
      brief: The local end of the LACP exchange (the device's own port).
      stability: development
    - id: partner
      value: "partner"
      brief: The remote end of the LACP exchange (the peer's port).
      stability: development
  stability: development
  brief: >
    Whether a LACP signal describes the local (actor) or remote (partner) end of the exchange.
  note: >
    The actor/partner distinction of IEEE 802.1AX (`ieee802-dot1ax` `actor-oper-state`/`partner-oper-state`; the `dot3adAggPortActor*`/`dot3adAggPortPartner*` object families of IEEE8023-LAG-MIB). A dimension on `network.neighbor.lacp.state` and `network.neighbor.lacp.churn`; meaningful only for a `network.neighbor` with `protocol=lacp`.
  examples: ["actor", "partner"]

- key: network.neighbor.lacp.state.flag
  type:
    members:
    - id: lacp_activity
      value: "lacp_activity"
      brief: Active LACP (sends PDUs proactively) vs passive (responds only).
      stability: development
    - id: lacp_timeout
      value: "lacp_timeout"
      brief: Short timeout (fast, 1s) vs long timeout (slow, 30s) PDU interval.
      stability: development
    - id: aggregation
      value: "aggregation"
      brief: The link is aggregatable rather than an individual link.
      stability: development
    - id: synchronization
      value: "synchronization"
      brief: The link is in sync and allocated to the aggregator.
      stability: development
    - id: collecting
      value: "collecting"
      brief: Collection of incoming frames on the link is enabled.
      stability: development
    - id: distributing
      value: "distributing"
      brief: Distribution of outgoing frames on the link is enabled.
      stability: development
    - id: defaulted
      value: "defaulted"
      brief: The partner information is using administratively configured defaults.
      stability: development
    - id: expired
      value: "expired"
      brief: The receive machine is in the EXPIRED state.
      stability: development
  stability: development
  brief: >
    A single flag within the IEEE 802.1AX LACP actor/partner operational-state octet.
  note: >
    The eight bits of the `ieee802-dot1ax` `actor-oper-state`/`partner-oper-state` octet (`dot3adAggPortActorOperState`/`PartnerOperState`; OpenConfig `/lacp/interfaces/interface/members/member/state`). The flags are NOT mutually exclusive, so each is reported as its own StateSet series on `network.neighbor.lacp.state` rather than packed into one integer — the same treatment `system.network.interface.status` gives a status surface. The coarse partner up/down is the normalized `network.neighbor.state` (`Collecting_Distributing`→`up`, `Detached`→`down`); these flags are the diagnostic layer beneath it.
  examples: ["collecting", "distributing", "synchronization"]
