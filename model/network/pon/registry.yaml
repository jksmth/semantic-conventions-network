file_format: definition/2

# network-pon (optical subset) â€” PON access optics for OLT and ONU/ONT.
#
# Scope: the OPTICAL layer of PON only. Most PON optics REUSES the
# endpoint model and is not redefined here:
#   - OLT PON-port downstream Tx + ONU downstream Rx + ONU upstream Tx are
#     ordinary `network.optical.channel` + `network.optical.power` (direction),
#     with `network.optical.wavelength` carrying the PON band plan
#     (GPON 1490â†“/1310â†‘, XGS-PON 1577â†“/1270â†‘).
#   - module temp/Vcc/status â†’ hw.*.
# This package adds only the genuinely PON-specific optical signals: the
# burst-mode upstream RSSI (a head-end measurement) and PON BIP-8/FEC link
# quality (the PON analogue of coherent BER).
#
# Producerâ‰ subject: ONU optical telemetry is measured by the OLT and relayed
# over OMCI. The ONU is the subject (its own `network.device`, role=onu); the
# OLT is `network.observer` with `collection.method=omci`. No new
# producerâ‰ subject machinery â€” `omci` added to the observer enum.
# See docs/entity-model.md (entity catalogue).
#
# What is NOT in this package, and where it goes instead:
#   - GEM per-cast TRAFFIC COUNTERS + channel CAPACITY are AUTHORED but live on
#     the interface/PON metrics, not as new GEM metrics: GEM bytes/packets/drops
#     fold onto `network.interface.io`/`.packets`/`.discards` with
#     `network.packet.type` (unicast/multicast/broadcast), and the channel L2
#     capacity is `network.pon.capacity`. See examples/olt-ont Â§7.1.
#   - GEM Port-ID as OBSERVED-TRAFFIC identity ("which GEM a flow rode") is a
#     FLOW-RECORD field â†’ owned by `network.flow` (the IETF
#     draft-ietf-opsawg-ipfix-gpon-gem `ingressGponGemPortId`); `network.pon.id`-style
#     reuse applies on the flow record. High-cardinality â†’ a record, never a metric.
#   - The GEM/T-CONT/Alloc-ID/VLAN SERVICE-MAPPING plane (a PON-forwarding
#     sub-interface layer) is durable PROVISIONING state, mostly OSS/BSS data
#     not OLT telemetry â†’ deferred here in `network.pon.*`, low observability
#     priority. This is NOT the technology-neutral `network.access.*` package
#     (which owns subscriber/service/circuit IDENTITY + the BNG control plane and
#     is already authored) â€” do NOT conflate the two.
#   - ONU online/offline and dying-gasp/LOS events are AUTHORED in
#     `model/pon/events.yaml` (`network.pon.onu.state.changed` /
#     `network.pon.onu.dying_gasp`); ONU activation/ranging state and DBA
#     bandwidth are AUTHORED here; the 1:N ODN relationship is the authored
#     `network.link` (topology=point_to_multipoint), `network.pon.id` as link id
#     â€” only the ODN/splitter physical-plant detail remains deferred.
#
# Do NOT reshape this optical layer to absorb the above.
#
# Prior art: ITU-T G.984 (GPON) / G.9807.1 (XGS-PON) / G.988 (OMCI),
# BBF TR-385 / bbf-xpon YANG; IETF draft-ietf-opsawg-ipfix-gpon-gem (GEM IPFIX).

attributes:
- key: network.pon.type
  type:
    members:
    - id: gpon
      value: "gpon"
      brief: ITU-T G.984 GPON (2.488Gâ†“ / 1.244Gâ†‘).
      stability: development
    - id: xgpon
      value: "xgpon"
      brief: ITU-T G.987 XG-PON (10Gâ†“ / 2.5Gâ†‘, asymmetric).
      stability: development
    - id: xgspon
      value: "xgspon"
      brief: ITU-T G.9807.1 XGS-PON (10G symmetric).
      stability: development
    - id: ngpon2
      value: "ngpon2"
      brief: ITU-T G.989 NG-PON2 (tunable, multi-wavelength TWDM).
      stability: development
    - id: epon
      value: "epon"
      brief: IEEE 802.3ah EPON (1G).
      stability: development
    - id: teng_epon
      value: "10g_epon"
      brief: IEEE 802.3av 10G-EPON.
      stability: development
  stability: development
  brief: >
    The PON standard of the port/ONU, which sets the upstream/downstream wavelength plan and line rate.
  note: >
    Open enum, lowercase. A descriptor of the OLT PON port and the ONUs on it. The specific wavelengths are carried by `network.optical.wavelength` on each channel; this attribute names the standard (and hence the band plan / coexistence regime).

- key: network.pon.onu.id
  type: int
  stability: development
  brief: >
    The ONU-ID assigned to the ONU on its PON port (ITU-T G.984.3 / G.9807.1), unique within the PON port.
  note: >
    A PON-local identifier (the on-tree address), distinct from the ONU's global `network.device.id` (the ONU is its own `network.device`, role=onu). Useful for correlating per-ONU measurements to the OLT's view of the tree. The ONU's membership on the tree is the general point-to-multipoint topology relationship: the ONU carries the PON link's `network.link.id` (= `network.pon.id`).
  examples: [1, 14, 127]

- key: network.pon.onu.registration_id
  type: string
  stability: development
  brief: >
    The ONU registration ID / LOID used to authenticate the ONU during activation.
  note: >
    The activation credential the ONU presents so the OLT admits it onto the PON â€” the ITU-T G.988 (OMCI) Registration ID, equivalently the vendor LOID (Logical ONU ID) / registration password. A descriptive, low-cardinality activation attribute distinct from BOTH the ONU Serial Number (`hw.serial_number`, vendor-id + serial, the hardware identity) and the ONU-ID (`network.pon.onu.id`, the on-tree address assigned after admission). PII-adjacent in some deployments (it can encode a subscriber/provisioning handle) â€” keep it entity/descriptive level, not a metric dimension.
  examples: ["REG-00A1B2C3", "HWTC01234567"]

# --- ONU tree address (PON-specific) -----------------------------------
# An ONU is a network.device (role=onu). "Which OLT reports/serves it" is
# the GENERAL observer relationship (network.observer.id, mandatory when
# producerâ‰ subject) â€” NOT a PON-specific parent id. The
# attributes below carry only the genuinely PON-specific on-tree address;
# the physical ONUâ†”OLT-port 1:N attachment is the general topology link
# (`network.link`, topology=point_to_multipoint), with
# `network.pon.id` as that link's id.
- key: network.pon.id
  type: string
  stability: development
  brief: >
    Identifier of the PON / optical distribution network (ODN tree) the ONU is attached to, scoped to its OLT.
  note: >
    Typically the OLT's PON port (e.g. the `network.interface.name` of the PON port, `gpon-4/0`). This is the **`network.link.id` of the point-to-multipoint PON link**: the OLT emits a `network.link` with `topology=point_to_multipoint`, `local.device.id`=the OLT, `local.interface.name`=the PON port, and each ONU references it by carrying this `network.pon.id`. Together with `network.observer.id` (the reporting OLT) and `network.pon.onu.id` this locates the ONU on the tree, and makes "every ONU on this PON" a query (filter by `network.pon.id`). The ODN / splitter as a physical-plant object (fibre runs, splitter stages) remains deferred to `network-access`; the 1:N relationship itself is now the authored `network.link`.
  examples: ["gpon-4/0", "xgs-4/2"]

# --- ONU activation state (the PON control plane) ----------------------
- key: network.pon.onu.state
  type:
    members:
    - id: offline
      value: "offline"
      brief: >
        The ONU is not present / not detected on the PON (ITU-T G.984.3 O1 Initial, or absent).
      stability: development
    - id: standby
      value: "standby"
      brief: Powered and waiting for activation (O2 Standby).
      stability: development
    - id: ranging
      value: "ranging"
      brief: >
        Registering / serial-number / ranging â€” the OLT is measuring round-trip delay and admitting the ONU (O3/O4).
      stability: development
    - id: operational
      value: "operational"
      brief: Activated and carrying traffic (O5 Operation).
      stability: development
    - id: emergency_stop
      value: "emergency_stop"
      brief: >
        Laser administratively shut down by the OLT (O7) â€” e.g. a rogue ONU. A forced-down condition, not a fault of the ONU's own.
      stability: development
    - id: unknown
      value: "unknown"
      brief: State cannot be determined.
      stability: development
  stability: development
  brief: >
    The ONU's activation state on the PON.
  note: >
    The normalized PON ONU activation state (ITU-T G.984.3 / G.9807.1). A dedicated enum, not the coarse `network.neighbor.state`: `ranging` and `emergency_stop` carry PON-specific meaning that `up`/`down` would lose. The verbatim vendor term is preserved in `network.pon.onu.native_state`. The onlineâ†”offline transition *event* is authored in `model/pon/events.yaml` (`network.pon.onu.state.changed`). See docs/conventions.md (state modelling).

- key: network.pon.onu.native_state
  type: string
  stability: development
  brief: >
    The verbatim, vendor-native ONU activation state string.
  examples: ["O5-Operation", "O4-Ranging", "emergency-stop", "los"]

# --- ONU provisioning state (the management / config plane) ------------
# Provisioning = has the operator applied configuration to ADOPT this ONU
# (assigned ONU-ID, service profile)? This is the management-plane axis and
# is ORTHOGONAL to network.pon.onu.state (PLOAM activation) and to
# network.admin.state / network.oper.state (X.731 managed-entity intent /
# capability). An ONU can be `operational` on the PON yet `unprovisioned`
# (autofound / unknown ONU, no config), or `provisioned` yet `offline`.
- key: network.pon.onu.provisioning.state
  type:
    members:
    - id: provisioned
      value: "provisioned"
      brief: >
        The operator has applied configuration to the ONU (assigned ONU-ID, service profile) â€” it is adopted and managed.
      stability: development
    - id: unprovisioned
      value: "unprovisioned"
      brief: >
        No configuration has been applied â€” the ONU may be physically present / discoverable on the PON but has not been adopted (the OLT "autofound" / unknown-ONU case).
      stability: development
    - id: unknown
      value: "unknown"
      brief: The provisioning state cannot be determined.
      stability: development
  stability: development
  brief: >
    The ONU's management-plane provisioning (configuration) state â€” whether the operator has applied configuration to adopt and configure the ONU.
  note: >
    The CONFIG / management-plane axis, orthogonal to the PLOAM activation axis (`network.pon.onu.state`: offline/ranging/operational) and to the X.731 managed-entity axes (`network.admin.state` / `network.oper.state`). An ONU can be `operational` on the PON yet `unprovisioned` (discovered but no service config), or `provisioned` yet `offline`. This is the native term in ITU-T G.988 (OMCI) / Nokia ISAM operations: a provisioned ONT is a managed entity, an unprovisioned one is not yet created. Open enum, lowercase â€” a producer with visibility of the OLT autofind list MAY add a `discovered` value (seen-but-not-configured) distinct from the generic `unprovisioned`.

# --- DBA (upstream bandwidth) ------------------------------------------
- key: network.pon.tcont.id
  type: int
  stability: development
  brief: >
    The T-CONT (Transmission Container) identifier â€” the upstream bandwidth container DBA grants against â€” within the ONU.
  note: >
    Optional dimension for per-T-CONT DBA bandwidth. When absent, DBA metrics are per-ONU aggregates. The full GEM-port / T-CONT / Alloc-ID service-mapping model is deferred to `network-access`; this is only the bandwidth-accounting handle. See docs/conventions.md (cardinality firewall).
  examples: [0, 1, 4]
