---
file_format: definition/2

# network-l2 events. Two different shapes, deliberately:
#
#   - network.l2.mac.moved        — a RECORD, NOT a state/alarm
#     event. A MAC is a count, not a durable entity; its move
#     carries per-object identity (the MAC + old/new port + VLAN), so it is an
#     observation record. It is a refinement of the
#     record-category base `network.attachment.moved` (RFC 7432 mobility) — it
#     supplies the typed MAC identifier + interface locators and inherits the
#     shared `network.attachment.sequence`/`.duplicate` flap-detection fields.
#   - network.l2.fdb.limit_exceeded — an ALARM (refines network.alarm,
#     cause=table_exhausted): a configured MAC/FDB limit was hit. Same shape as
#     network.session.table_exhausted — a finite forwarding table filled.
#
# See docs/conventions.md (events).

event_refinements:
- id: network.l2.mac.moved
  ref: network.attachment.moved
  stability: development
  brief: >
    A MAC address moved from one interface to another within a VLAN/bridge domain — the classic "is there a loop / is someone spoofing / did a host roam" signal. An observation RECORD (it names a specific MAC and its old/new port), not a state transition of a durable entity.
  note: |
    The bridging-layer member of the move family (RFC 7432 §15 / 802.1Q FDB
    station-move) — NOT a `network.state.changed` (a MAC is a count,
    not an entity). Carries the moved `network.l2.mac.address`,
    the port it moved TO as the reused `network.interface.name`, and the port it
    moved FROM as `network.l2.mac.previous_interface.name`. Inherits
    `network.attachment.sequence` (how many times this MAC has moved) and
    `network.attachment.duplicate` (`true` ⇒ flapping = loop/spoof, not a clean
    move) from the base. Associates `network.vlan` (the broadcast domain the
    move occurred in); on an explicit bridging context report `network.instance`
    instead/as well.

    Bulk MAC learn/age are deliberately NOT events (a per-MAC firehose); the
    occupancy gauge (`network.l2.fdb.entry.count`) and capacity util cover steady
    state. Only the MOVE — the anomaly — is recorded.
  attributes:
  - ref: network.l2.mac.address
    requirement_level: required
  - ref: network.l2.mac.previous_interface.name
    requirement_level: required
    note: The interface the MAC moved FROM (the previous locator).
  - ref: network.interface.name
    requirement_level: required
    note: The interface the MAC moved TO (its new/current locator).
  - ref: network.vlan.id
    requirement_level: recommended
    note: The VLAN/broadcast domain the move occurred in.
  entity_associations:
  - network.vlan
  - network.instance

- id: network.l2.fdb.limit_exceeded
  ref: network.alarm
  stability: development
  brief: >
    A configured MAC/FDB learning limit was reached on a VLAN or bridging instance — learning stops (or the port errors-disables), a silent connectivity failure for new hosts. The raised/cleared alarm complementing the `network.l2.fdb.entry.count` occupancy gauge and the `network.component.utilization` (mac_table) ceiling.
  note: |
    `network.alarm.cause=table_exhausted` (optionally
    `category=processing_error`), the same shape as
    `network.session.table_exhausted` — a finite forwarding table filled. The
    configured ceiling is `network.vlan.fdb.limit` (per-VLAN) or
    `network.instance.fdb.limit` (per-instance). Associates `network.vlan`
    and/or `network.instance` depending on where the limit is scoped.
  entity_associations:
  - network.vlan
  - network.instance
  attributes:
  - ref: network.alarm.cause
    requirement_level: required
    note: Always `table_exhausted` for this refinement.
  - ref: network.alarm.category
    requirement_level: opt_in
    note: Normally `processing_error` (a resource-limit fault).
