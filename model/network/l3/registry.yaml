---
file_format: definition/2

# network-l3 — the L3 data-plane resolution table (ARP / IPv6 ND), the L3 twin
# of the authored network-l2 MAC FDB.
#
# What this is. Every routed interface (SVI, routed port) maintains an
# ARP table (IPv4 → MAC) and an ND cache (IPv6 → MAC). It is the L2/L3 binding
# that sits BETWEEN the two tables the model already built:
#   - the MAC FDB at L2          (network.l2.fdb.entry.count — MAC → port)
#   - the RIB / neighbours at L3  (network.routing.route.count / network.neighbor)
# A route gives a next-hop IP; the RIB resolves the prefix to that IP; ARP/ND
# resolves that IP to a MAC so a frame can actually be built. It is none of:
#   - the MAC FDB        (that is MAC→port, pure L2)
#   - the RIB            (that is prefix→next-hop-IP)
#   - a network.neighbor (that is a control-plane protocol SESSION — hello-based,
#                         stateful, with an as.number; ARP/ND is a data-plane cache with
#                         no session). The package deliberately avoids the word
#                         "neighbor" and uses "adjacency" (the standard vendor term;
#                         RFC 4861's "neighbor cache" name would collide).
#
# Cardinality: 10^4+ entries, bounded by hosts/traffic and churning
# constantly → COUNT + record, never per-entry entities. network.l3.arpnd.entry.count
# copies network.l2.fdb.entry.count one layer up.
#
# AF: ipv4=ARP, ipv6=ND is the DATA-PLANE IP version → reuse the upstream
# Stable `network.type` as a dimension (NOT the control-plane network.address_family).
#
# Prior art: RFC 826 (ARP), RFC 4861 (IPv6 ND), RFC 5227 (IPv4 ACD / duplicate
# detection); openconfig-if-ip neighbour lists; TR-181 neighbour tables; Dynamic
# ARP Inspection / ND-inspection (the spoof-detect source).

attributes:
- key: network.l3.arpnd.entry.type
  type:
    members:
    - id: dynamic
      value: "dynamic"
      brief: Dynamically resolved via ARP request / ND solicitation.
      stability: development
    - id: static
      value: "static"
      brief: Statically configured (administratively pinned).
      stability: development
    - id: control_plane
      value: "control_plane"
      brief: >
        Installed by the control plane — e.g. an EVPN Type-2 MAC/IP advertisement that synchronises the ARP/ND binding across the fabric (the L3 face of the same control_plane entry type the L2 MAC FDB carries; the Type-2 dual-population tie).
      stability: development
  stability: development
  brief: How an ARP/ND adjacency was installed.
  note: >
    Mirrors `network.l2.fdb.entry.type` one layer up. Sum across the values gives total occupancy of the resolution table.

- key: network.l3.arpnd.state
  type:
    members:
    - id: reachable
      value: "reachable"
      brief: >
        Resolved and confirmed reachable (ARP complete; ND REACHABLE).
      stability: development
    - id: stale
      value: "stale"
      brief: >
        Resolved but not recently confirmed — a normal, healthy ND state (ND STALE), not a fault.
      stability: development
    - id: probe
      value: "probe"
      brief: >
        Actively re-verifying reachability — a normal, transient ND state (ND DELAY / PROBE).
      stability: development
    - id: incomplete
      value: "incomplete"
      brief: >
        Unresolved — resolution in progress and not yet answered (ARP incomplete; ND INCOMPLETE). The next-hop-not-answering fault signal.
      stability: development
    - id: permanent
      value: "permanent"
      brief: Administratively pinned / static entry.
      stability: development
    - id: unknown
      value: "unknown"
      brief: State cannot be determined.
      stability: development
  stability: development
  brief: >
    The normalized state of an ARP/ND adjacency.
  note: |
    The "normalized + native" pattern, but a DEDICATED enum — NOT folded into
    `network.neighbor.state`: `stale` and `probe` are healthy, intentional ND
    states that mapping to `up`/`down` would misreport, exactly as the OSPF
    `2-Way` and PON `ranging` cases. `incomplete` is the one fault state
    (next-hop silent).
    The verbatim term is preserved in `network.l3.arpnd.native_state`.

    Mapping (RFC 4861 ND FSM / ARP):

    | network.l3.arpnd.state | ARP        | ND (RFC 4861)   |
    |----------------------------|------------|-----------------|
    | reachable                  | complete   | REACHABLE       |
    | stale                      | —          | STALE           |
    | probe                      | —          | DELAY, PROBE    |
    | incomplete                 | incomplete | INCOMPLETE       |
    | permanent                  | static     | (static)        |

    Used as a dimension on `network.l3.arpnd.entry.count` (per-state occupancy,
    so the unresolved/incomplete count is a series) and as an enum-as-attribute
    gauge if a per-state current-state view is authored.

- key: network.l3.arpnd.native_state
  type: string
  stability: development
  brief: >
    The verbatim device-/vendor-native ARP/ND adjacency state string.
  examples: ["REACHABLE", "STALE", "PROBE", "INCOMPLETE", "complete"]
