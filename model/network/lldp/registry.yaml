file_format: definition/2

# network-lldp — LLDP operational statistics (IEEE 802.1AB, LLDP-MIB).
#
# This package carries the *operational health* of the LLDP plane — NOT LLDP
# identity/topology, which already lives on `network.link` (local/remote
# chassis-id/port-id, `discovery.protocol=lldp`) and `network.neighbor`
# (`protocol=lldp`). It is the discovery-quality / trust signal for that
# topology data: rising errors/ageouts/drops mean the discovered links and
# neighbours are going stale or unreliable.
#
# Scope split: the LLDP-MIB statistics are NEVER per-remote-system.
# They are per-local-port (`lldpStatsTxPortTable`/`lldpStatsRxPortTable`) and
# per-agent/global (`lldpStatsRemTablesGroup`). A discarded/errored frame has no
# identifiable neighbour (that is why it was discarded), and the table churn is
# an agent property — so these metrics attach to `network.interface` and
# `network.device`, never `network.neighbor`, and never the neighbour-scoped
# `network.protocol.*` counters.
#
# Idiom: one counter + a discriminator dimension, as
# `network.interface.errors` uses `error.type` and `network.component.utilization`
# uses `network.component.resource`. The per-domain `network.lldp.*` namespace is
# consistent with `network.l2.*` / `network.stp.*` / `network.multicast.*`.
#
# Reused (not redefined): `network.io.direction` and `error.type` are upstream
# refs (Principle 8). The LLDP-scoped well-known `error.type` value set is
# documented on the `network.lldp.errors` metric note (the same way
# `network.protocol.message.type` is scoped to its protocol), not redefined here.
#
# Prior art: LLDP-MIB (`lldpStatsRxPortTable`: FramesDiscardedTotal,
# FramesErrors, FramesTotal, TLVsDiscardedTotal, TLVsUnrecognizedTotal,
# AgeoutsTotal; `lldpStatsTxPortTable`: FramesTotal; `lldpStatsRemTablesGroup`:
# Inserts/Deletes/Drops/Ageouts/LastChangeTime); OpenConfig `openconfig-lldp`
# `/lldp/interfaces/interface/state/counters`; TR-181 `Device.LLDP`.

attributes:
  - key: network.lldp.remote_change.type
    type:
      members:
        - id: insert
          value: "insert"
          brief: >
            A new remote-system entry was inserted into the agent's remote
            table (`lldpStatsRemTablesInserts`).
          stability: development
        - id: delete
          value: "delete"
          brief: >
            A remote-system entry was removed from the table
            (`lldpStatsRemTablesDeletes`).
          stability: development
        - id: drop
          value: "drop"
          brief: >
            A remote-system entry could NOT be stored due to insufficient
            agent resources (`lldpStatsRemTablesDrops`) — the standout fault
            signal: topology the agent saw but could not retain.
          stability: development
        - id: ageout
          value: "ageout"
          brief: >
            A remote-system entry aged out of the table because its TTL
            expired (`lldpStatsRemTablesAgeouts`). Global/agent scope —
            distinct from the per-port rx ageout on `network.lldp.errors`.
          stability: development
    stability: development
    brief: >
      The kind of change to the agent's LLDP remote-systems table, counted by
      `network.lldp.remote_changes`.
    note: >
      The `lldpStatsRemTablesGroup` of the LLDP-MIB. Open enum, lowercase,
      custom values MAY be used. Global (per-agent) scope — these are NOT
      per-remote-system and NOT per-port.
