---
file_format: definition/2

# network-link — the topology relationship between network endpoints, and the
# home of the point-to-multipoint / shared-medium primitive.
#
# A `network.link` is a cross-device edge: a discovered or configured
# connection anchored at a LOCAL termination (this device + interface) and,
# for a two-ended link, a REMOTE termination. Telemetry often knows its local
# end before (or without) the far end (LLDP local + remote-as-claimed), so the
# remote side is optional.
#
# The 1:N fix: access media are point-to-multipoint, but the edge was
# only ever two-ended. Rather than mint a new "shared medium" entity, the link
# carries the standard OSPF/IETF NETWORK TYPE (`network.link.topology` ∈
# point_to_point / point_to_multipoint / broadcast / nbma — RFC 2328 §2.1.1,
# RFC 6845). A point_to_multipoint link is a head-end-owned HUB: the head-end
# is the local termination (the root), and each member endpoint attaches by
# carrying the link's `network.link.id` (the lag/stp hub-and-spoke pattern)
# — so no n-ary edge is required and nothing here is
# OTel-blocked. Only rich relationship *typing* (is-root-of vs is-member-of)
# and the genuinely ownerless multi-observer segment (a dumb `broadcast` LAN
# with no head-end) remain pending the OTel edge/relationship work.
#
# `network.link.type` (the layer/medium) and `network.link.topology` (the
# network type / cardinality) are ORTHOGONAL axes, both kept — same discipline
# as `network.interface.role` vs `network.interface.vlan.mode`.
#
# Per-technology on-medium ids ARE the link id for that technology:
# PON's `network.pon.id` (the ODN/PON-port) is the `network.link.id` of a
# `point_to_multipoint` link; a WiFi BSSID plays the same role. "Which
# head-end serves a subordinate device" stays the general observer
# relationship (`network.observer.id`), never a per-technology key.
#
# Prior art: RFC 8345 (ietf-network-topology: node / termination-point / link),
# RFC 2328 / RFC 6845 (OSPF network types), IEEE 802.1AB (LLDP) for discovery,
# ITU-T G.984 ODN (PON tree) / IEEE 802.11 BSS as point_to_multipoint instances.

attributes:
# --- Identity ----------------------------------------------------------
- key: network.link.id
  type: string
  stability: development
  brief: >
    Identifier of the link, unique within the reporting/observing scope.
  note: |
    Unlike a sub-entity, a link is NOT scoped by a single `network.device`
    (it spans devices), so its identity is just `network.link.id`. It SHOULD
    be derived from the most stable end the reporter knows:
    - point_to_point: a stable composite of the local termination (e.g.
      `device.id` + `interface.id`), or an operator/controller-assigned id;
    - point_to_multipoint / broadcast: the head-end termination — for PON
      this is exactly `network.pon.id` (the ODN / OLT PON-port); for WiFi
      the BSSID.

    Member endpoints of a point_to_multipoint link reference it by carrying
    this same `network.link.id` (the membership key — see the entity note).
  examples: ["lldp:Et1/1->core1:Et3/2", "gpon-4/0", "bss:a1:b2:c3:d4:e5:f6"]

# --- Classification (two orthogonal axes) ------------------------------
- key: network.link.type
  type:
    members:
    - id: physical
      value: "physical"
      brief: A physical L1/L2 connection (the wire/fibre/RF medium).
      stability: development
    - id: logical
      value: "logical"
      brief: An L3 / logical adjacency between endpoints.
      stability: development
    - id: optical
      value: "optical"
      brief: An optical-layer connection (lambda / fibre span).
      stability: development
    - id: lag
      value: "lag"
      brief: A link-aggregation bundle between two devices.
      stability: development
    - id: tunnel
      value: "tunnel"
      brief: An encapsulated overlay link (GRE/IPsec/VXLAN/…).
      stability: development
    - id: pseudowire
      value: "pseudowire"
      brief: An emulated point-to-point L2 circuit (PW/VPWS).
      stability: development
  stability: development
  brief: >
    The layer / medium of the link (what kind of connection it is).
  note: >
    Open enum, lowercase, custom values MAY be used. Orthogonal to `network.link.topology` (the network type / cardinality) — a link is both a `type` (e.g. `physical`) and a `topology` (e.g. `point_to_multipoint`). Encapsulation/overlay specifics (VXLAN VNI, MPLS labels) are not values here; they live on `network.tunnel` / flow records (the category discipline).

- key: network.link.topology
  type:
    members:
    - id: point_to_point
      value: "point_to_point"
      brief: >
        Exactly two terminations (local + remote). The default for a router/switch interconnect.
      stability: development
    - id: point_to_multipoint
      value: "point_to_multipoint"
      brief: >
        One head-end termination serving many member endpoints over a shared medium (PON ODN tree, WiFi BSS, PtMP fixed-wireless, DOCSIS MAC domain). The head-end is the local termination (root); members attach by `network.link.id`.
      stability: development
    - id: broadcast
      value: "broadcast"
      brief: >
        A broadcast multi-access segment where all attached nodes are peers (a classic Ethernet LAN / hub). Has no head-end owner.
      stability: development
    - id: nbma
      value: "nbma"
      brief: >
        Non-broadcast multi-access (e.g. Frame Relay, a partial mesh): many endpoints, no native broadcast.
      stability: development
  stability: development
  brief: >
    The network type of the link — its cardinality / shared-medium class, using the OSPF/IETF taxonomy (RFC 2328, RFC 6845).
  note: |
    The point-to-multipoint primitive. `point_to_multipoint` is a
    head-end-owned 1:N hub: the head-end emits the link (it owns and observes
    the whole medium — OLT→ONUs, AP→stations), `network.link.local.*`
    is the head-end (root), `network.link.remote.*` is unset, and each member
    references the link via `network.link.id` (the hub-and-spoke pattern of
    `network.lag`/`network.stp.instance`).

    `broadcast` (an ownerless peer LAN) and the cross-device two-ended
    `point_to_point`/`nbma` cases where only one end reports involve a
    relationship the OTel edge model cannot yet type richly; they MAY be
    reported one-sidedly today (local end + claimed remote). Open enum.

# --- Terminations ------------------------------------------------------
- key: network.link.local.device.id
  type: string
  stability: development
  brief: >
    `network.device.id` of the local termination of the link.
  note: >
    For a `point_to_multipoint` / `broadcast` link this is the head-end (root) device that owns the medium.
  examples: ["olt-metro-03", "core1"]

- key: network.link.local.interface.name
  type: string
  stability: development
  brief: >
    `network.interface.name` of the local termination of the link.
  note: >
    References a `network.interface` on the local device. For a PON link this is the OLT PON port (e.g. `gpon-4/0`).
  examples: ["gpon-4/0", "Ethernet3/2", "ae0"]

- key: network.link.remote.device.id
  type: string
  stability: development
  brief: >
    `network.device.id` of the remote termination (point_to_point links).
  note: >
    Often known later than, or independently of, the local end (LLDP remote-as-claimed). Absent for `point_to_multipoint` links, where the many members attach by `network.link.id` rather than as a single remote.
  examples: ["core2", "spine-01"]

- key: network.link.remote.interface.name
  type: string
  stability: development
  brief: >
    `network.interface.name` of the remote termination (point_to_point links).
  examples: ["Ethernet1/1", "xe-0/0/3"]

# --- Discovery + state -------------------------------------------------
- key: network.link.discovery.protocol
  type:
    members:
    - id: lldp
      value: "lldp"
      brief: Discovered via LLDP (IEEE 802.1AB).
      stability: development
    - id: cdp
      value: "cdp"
      brief: Discovered via CDP.
      stability: development
    - id: bgp_ls
      value: "bgp_ls"
      brief: Learned via BGP Link-State (BGP-LS).
      stability: development
    - id: isis_te
      value: "isis_te"
      brief: Learned via IS-IS TE extensions.
      stability: development
    - id: controller
      value: "controller"
      brief: Provided by an SDN/controller/management system.
      stability: development
    - id: manual
      value: "manual"
      brief: Statically configured / operator-asserted.
      stability: development
  stability: development
  brief: >
    How the link was discovered or learned.
  note: >
    Open enum, lowercase. Distinct from `network.observer.collection.method` (how the telemetry was collected): this is how the *topology* was learned.

- key: network.link.state
  type:
    members:
    - id: up
      value: "up"
      brief: The link is operational.
      stability: development
    - id: down
      value: "down"
      brief: The link is down.
      stability: development
    - id: degraded
      value: "degraded"
      brief: >
        Operational but impaired (e.g. a LAG up below its configured min-links, or a point_to_multipoint medium with members down).
      stability: development
    - id: unknown
      value: "unknown"
      brief: State cannot be determined.
      stability: development
  stability: development
  brief: >
    The operational state of the link.
  note: >
    The same coarse health vocabulary as `network.neighbor.state` (`up·down·degraded·unknown`), applied to a topology edge. Open enum, lowercase.
