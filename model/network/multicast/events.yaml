---
file_format: definition/2

# network-multicast events (records-and-ingestion design).
# The MEMBERSHIP-REPORT sub-family of the third event category — distinct from
# the locator-MOVE family (mac.moved / evpn.mac.moved / wifi.station.roamed).
# A join/leave is NOT a move (nothing changed locator) and NOT a state-change
# (no durable entity transitioned — a receiver is not an entity); it is
# an observation RECORD carrying per-object identity (the group, the source).
#
# Anchor: IGMPv3 (RFC 3376) / MLDv2 (RFC 3810) — the source-filtered
# INCLUDE/EXCLUDE membership model already cited in this package's prior-art;
# SSM `(S,G)` interest is RFC 4607. A standalone record, NOT a refinement of
# `network.state.changed` / `network.alarm` / `network.attachment.moved`.
#
# Pairs with the `network.multicast.group.count` occupancy gauge (the bounded count
# that survives a restart); this is the point-in-time
# join/leave the gauge cannot reconstruct. The per-(S,G) forwarding firehose
# stays out (the cardinality firewall) — only the membership transition is a
# record.
events:
- name: network.multicast.membership.changed
  stability: development
  brief: >
    A receiver joined or left a multicast group on an interface — the IGMP/MLD membership-report record (RFC 3376 / RFC 3810). An observation RECORD naming the group (and source, for SSM), not a state transition: the point-in-time join/leave behind the `network.multicast.group.count` occupancy gauge.
  note: |
    The membership sub-family of the third category. Carries
    `network.multicast.group.address` (the group), the
    `network.multicast.membership.action` (`join`/`leave`), and — for
    source-filtered IGMPv3/MLDv2/SSM membership — `network.multicast.source.address`
    and `network.multicast.membership.filter_mode` (`include`/`exclude`).
    `network.multicast.membership.protocol` (`igmp`/`mld`) reuses the key
    already on the occupancy gauge. Associates `network.interface` (the
    SVI/routed port where hosts join) and `network.instance` (the VRF).

    Not a move (no previous/current locator) and not a state-change (a receiver
    is a count, not an entity); forcing it onto either shape would
    put the high-cardinality group/source identity on the wrong envelope.
  attributes:
  - ref: network.multicast.group.address
    requirement_level: required
  - ref: network.multicast.membership.action
    requirement_level: required
  - ref: network.multicast.source.address
    requirement_level: opt_in
    note: The source (S) for source-filtered / SSM membership.
  - ref: network.multicast.membership.filter_mode
    requirement_level: opt_in
  - ref: network.multicast.membership.protocol
    requirement_level: recommended
  - ref: network.event.message
    requirement_level: opt_in
  entity_associations:
  - network.interface
  - network.instance
