---
file_format: definition/2

# network-qos metrics ‚Äî Plane A: the per-class queue counter plane.
#
# All attach to `network.interface` (entity_associations) ‚Äî this package mints
# NO entity: the forwarding CLASS is a bounded dimension, not a
# queue entity. `network.io.direction` is the upstream egress/ingress
# axis (queueing is almost always egress; ingress carries policer drops).
# See docs/conventions.md (cardinality firewall).
#
# Decomposition rule: `network.qos.queue.drops` is the per-CLASS
# breakdown of the queueing subset of `network.interface.discards`; the per-class
# drops sum to ‚â§ the port-total discard. A backend MUST NOT add the two ‚Äî the
# typed-slice discipline, the same as `network.evpn.route.count` not
# double-counting the unicast RIB.

metrics:
- name: network.qos.queue.transmitted
  stability: development
  brief: >
    Bytes serviced (dequeued and transmitted) out of a class queue.
  instrument: counter
  unit: "By"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  - ref: network.qos.class
    requirement_level: required
  entity_associations:
  - network.interface

- name: network.qos.queue.packets
  stability: development
  brief: >
    Packets serviced (dequeued and transmitted) out of a class queue.
  instrument: counter
  unit: "{packet}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  - ref: network.qos.class
    requirement_level: required
  entity_associations:
  - network.interface

- name: network.qos.queue.drops
  stability: development
  brief: >
    Packets dropped from a class queue, by drop mechanism ‚Äî the per-class breakdown `network.interface.discards` cannot express.
  note: >
    A decomposition of the queueing subset of `network.interface.discards`, not an addition to it. `network.qos.drop.reason` separates congestion (`tail`/`wred`/`buffer`) from policy (`policer`/`shaper`) ‚Äî the WRED-vs-tail question every QoS scenario asked for.
  instrument: counter
  unit: "{packet}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  - ref: network.qos.class
    requirement_level: required
  - ref: network.qos.drop.reason
    requirement_level: recommended
  entity_associations:
  - network.interface

- name: network.qos.queue.depth
  stability: development
  brief: >
    Instantaneous occupancy of a class queue.
  note: >
    A gauge in bytes (the buffer-occupancy view). Rising depth on a class is the leading indicator of the tail/WRED drops that follow.
  instrument: gauge
  unit: "By"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  - ref: network.qos.class
    requirement_level: required
  entity_associations:
  - network.interface

- name: network.qos.queue.depth.max
  stability: development
  brief: >
    Peak (high-water-mark) occupancy of a class queue since the last read.
  note: >
    The watermark that survives between polls ‚Äî a momentary microburst that the instantaneous `network.qos.queue.depth` gauge misses.
  instrument: gauge
  unit: "By"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  - ref: network.qos.class
    requirement_level: required
  entity_associations:
  - network.interface

- name: network.qos.policer.drops
  stability: development
  brief: >
    Packets dropped by an ingress/egress policer (rate limiter), by metering color.
  note: >
    The metering-plane drop, distinct from queue congestion: `network.qos.color` carries the RFC 2697/2698 srTCM/trTCM result (`red` is the violating, drop-eligible color).
  instrument: counter
  unit: "{packet}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  - ref: network.qos.class
    requirement_level: recommended
  - ref: network.qos.color
    requirement_level: recommended
  entity_associations:
  - network.interface

- name: network.qos.shaper.delayed
  stability: development
  brief: >
    Packets buffered (delayed) by a shaper to enforce a class's rate ‚Äî the "is this class being throttled?" evidence.
  note: >
    Shaper-buffered, not dropped (the drop case is `network.qos.queue.drops` with `drop.reason=shaper`). A rising shaped-delay on a class is congestion conformance in action ‚Äî the aggregate twin of the per-subscriber HQoS shaping answer that lives in the deferred Plane-B record.
  instrument: counter
  unit: "{packet}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  - ref: network.qos.class
    requirement_level: required
  entity_associations:
  - network.interface
