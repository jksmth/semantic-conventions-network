---
file_format: definition/2
attributes:
# --- Identity / core ---------------------------------------------------
- key: network.instance.name
  type: string
  stability: development
  brief: >
    Name of the forwarding/routing context, unique within the device.
  note: |
    This is the construct commonly called a VRF (L3), a bridge-domain /
    VSI (L2), or a "network instance". The name is unique only within a
    `network.device`; the owning `network.device` entity is expected in
    the same Resource to fully identify it (see Multi-Observer guidance in
    the OTel Resource & Entities guide). The reserved name for the
    default/global context is `default`.
  examples: ["default", "blue", "VRF-CUST-A", "MAC-VRF-100"]

- key: network.instance.id
  type: string
  stability: development
  brief: >
    Platform-assigned identifier for the instance (e.g. a routing-table or VRF index), when distinct from `network.instance.name`.
  examples: ["1001", "10"]

- key: network.instance.type
  type:
    members:
    - id: default
      value: "default"
      brief: The default / global routing and forwarding context.
      stability: development
    - id: l3vrf
      value: "l3vrf"
      brief: A Layer 3 VRF (IP routing/forwarding context).
      stability: development
    - id: l2vsi
      value: "l2vsi"
      brief: >
        A Layer 2 virtual switch instance / bridge-domain (e.g. VPLS or EVPN MAC-VRF).
      stability: development
    - id: l2p2p
      value: "l2p2p"
      brief: >
        A Layer 2 point-to-point context (e.g. VPWS / pseudowire).
      stability: development
    - id: l2l3
      value: "l2l3"
      brief: >
        An integrated Layer 2 + Layer 3 instance (e.g. EVPN with IRB).
      stability: development
  stability: development
  brief: The type of forwarding/routing context.
  note: |
    Aligns with the OpenConfig `network-instance` type identities
    (`DEFAULT_INSTANCE`, `L3VRF`, `L2VSI`, `L2P2P`, `L2L3`).

    `type` is the forwarding CONSTRUCT (what the context *is*) — it is NOT a
    place to encode the context's PURPOSE. A management/OOB VRF is an `l3vrf`
    whose *purpose* is management; there is deliberately no `mgmt`/`management`
    type (re-affirmed by the type-vs-role discipline — the
    same mistake `cpe`-as-a-type would have been). Carry the purpose as
    `network.instance.label.purpose=management` (the tagging ladder), and the
    OOB port as `network.interface.role=management`. The same applies to other
    purpose tags (internet/customer/voice VRFs): purpose is a label, the VRF is
    still an `l3vrf`.

# --- Operator metadata (open-ended) -----------------------------------
- key: network.instance.label
  type: template[string]
  stability: development
  brief: >
    An operator-assigned label on the instance, the `<key>` being the label name and the value being the label value (even if empty).
  note: |
    Open-ended operator tagging, mirroring `k8s.*.label`. For example, a
    label `tenant` with value `acme` SHOULD be recorded as the
    `network.instance.label.tenant` attribute with value `"acme"`.

    Decision rule (the "tagging ladder"):

    - Known, enumerable classification with shared meaning → use a defined
      attribute (e.g. `network.instance.type`, or `network.interface.role`).
    - Proprietary, vendor-defined semantics → use a top-level vendor
      namespace keyed by `network.device.vendor.name` (e.g. `cisco.*`).
    - Unbounded, operator-defined metadata with no shared schema → use a
      `network.*.label.<key>` template attribute (this).

    The same `network.<entity>.label` pattern applies to other entities
    (e.g. `network.device.label`, `network.interface.label`). Labels are
    entity/resource metadata; because the key space is unbounded they
    MUST NOT be attached to high-cardinality metric or flow data points.
  examples: ["acme", "gold", ""]

# --- L3 VPN context (L3VRF / L2L3) ------------------------------------
- key: network.instance.route_distinguisher
  type: string
  stability: development
  brief: >
    Route Distinguisher (RD) of the instance, used by MPLS/BGP VPN (L3VPN / EVPN) contexts.
  examples: ["65000:1001", "192.0.2.1:100"]

- key: network.instance.route_target
  type: string[]
  stability: development
  brief: >
    BGP Route Targets (RTs) imported and/or exported by the instance.
  note: >
    Where the import vs. export direction must be distinguished, encode it in a future refinement or in the value convention. Typically reported opt-in due to potential cardinality.
  examples: [["65000:1001"], ["65000:100", "65000:200"]]

# --- L2 specialization (L2VSI / L2L3) ---------------------------------
- key: network.instance.vni
  type: int
  stability: development
  brief: >
    VXLAN Network Identifier (VNI) bound to this instance: the L2VNI for an `l2vsi`, or the L3VNI for an `l3vrf`/`l2l3` in symmetric EVPN IRB.
  examples: [10100, 50000]

- key: network.instance.fdb.mac_learning
  type:
    members:
    - id: enabled
      value: "enabled"
      brief: Dynamic MAC learning is enabled for the instance.
      stability: development
    - id: disabled
      value: "disabled"
      brief: >
        Dynamic MAC learning is disabled (e.g. control-plane / EVPN learning only).
      stability: development
  stability: development
  brief: Dynamic MAC learning mode for an L2 instance.

- key: network.instance.fdb.limit
  type: int
  stability: development
  brief: >
    Configured maximum number of MAC addresses the L2 instance may learn, if a limit is set.
  examples: [8192, 131072]
