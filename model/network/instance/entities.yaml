---
file_format: definition/2
entities:
- type: network.instance
  stability: development
  brief: >
    A network forwarding/routing context on a device: a VRF (L3), a bridge-domain / virtual switch instance (L2), a point-to-point L2 service, or an integrated L2+L3 (EVPN IRB) instance.
  note: |
    `network.instance` is the unifying entity for forwarding/routing
    partitions. Routes, protocol neighbours, and interface bindings attach to
    a `network.instance`. The 802.1Q broadcast domain is modelled separately
    as `network.vlan`; for simple enterprise switching a VLAN is effectively
    the bridge domain and no explicit `l2vsi` instance is required.

    Identity and scoping:

    - `network.instance.name` is unique only within its owning
      `network.device`. The `network.device` entity is expected to be present
      in the same Resource so that (device, instance name) together identify
      the context. This follows the "telescoping identity" model and the
      K8s precedent where `k8s.container` identity relies on the co-present
      `k8s.pod`.
    - Identifying attributes MUST NOT change during the lifespan of the
      instance.
    - Multiple observers (SNMP, gNMI/OpenConfig, NETCONF) MUST derive the same
      `network.instance.name` for the same context; where a platform exposes
      only a numeric id, populate `network.instance.id` and keep `name`
      consistent across collectors.

    Maps 1:1 to the OpenConfig `network-instance` and to the routing/bridging
    contexts in TR-181 Device:2.
  identity:
  - ref: network.instance.name
  description:
  - ref: network.instance.type
    requirement_level: recommended
  - ref: network.instance.id
    requirement_level: opt_in
  - ref: network.instance.route_distinguisher
    requirement_level: opt_in
  - ref: network.instance.route_target
    requirement_level: opt_in
  - ref: network.instance.label
    requirement_level: opt_in
  # L2 specialization — reported when the instance does Layer 2 bridging
  # (type l2vsi / l2l3).
  - ref: network.instance.vni
    requirement_level: opt_in
  - ref: network.instance.fdb.mac_learning
    requirement_level: opt_in
  - ref: network.instance.fdb.limit
    requirement_level: opt_in
  # Segment Routing per-context blocks. SRGB/SRLB occupancy
  # is reported via network.component.utilization (resource=srgb/srlb).
  - ref: network.sr.srgb.lower
    requirement_level: opt_in
  - ref: network.sr.srgb.upper
    requirement_level: opt_in
  - ref: network.sr.srlb.lower
    requirement_level: opt_in
  - ref: network.sr.srlb.upper
    requirement_level: opt_in
  - ref: network.srv6.locator
    requirement_level: opt_in
