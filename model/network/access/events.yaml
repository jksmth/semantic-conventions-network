---
file_format: definition/2

# network-access events. The subscriber-access events named in the registry (model/access/
# registry.yaml "the subscriber session lifecycle EVENT, pool-exhausted and
# AAA-unreachable EVENTS → events package"). Three refinements:
#
#   - network.access.session.state.changed — a subscriber session (PPPoE/IPoE)
#     changed lifecycle state; refines `network.state.changed`. Pairs with the
#     `network.access.session.state` dimension on `network.access.session.count`.
#     (A session is NOT an entity; the event associates the NAS/BNG
#     `network.device`. Per-session 5-tuple/cause belong on the session-close
#     RECORD, not on this transition.)
#   - network.access.pool_exhausted — an address pool ran out; refines
#     `network.alarm` (cause=`table_exhausted`). Associates `network.access.pool`.
#   - network.access.aaa.unreachable — a RADIUS/Diameter (or DHCP) server is
#     unreachable; refines `network.alarm` (cause=`service_unreachable`) — the
#     onboarding-impaired condition.
event_refinements:
- id: network.access.session.state.changed
  ref: network.state.changed
  stability: development
  brief: >
    A subscriber access session changed lifecycle state — PPPoE/IPoE connecting → up → terminating → down. The transition the `network.access.session.state` gauge dimension shows the aggregate of but cannot reconstruct per session after a restart.
  note: |
    `network.event.state.dimension=operational`. Native endpoints in
    `network.event.state.previous`/`current` carry the verbatim session state
    (the `network.access.session.state` vocabulary — "connecting"→"up",
    "up"→"terminating"). Associates the NAS/BNG `network.device` (a session is
    a count + record, not an entity). The subscriber may be carried
    as `network.access.subscriber.id` (opt-in — PII / high cardinality, see
    the attribute's note); the per-session id / 5-tuple / disconnect-cause
    belong on the session-close RECORD, not on this transition event.
  entity_associations:
  - network.device
  attributes:
  - ref: network.event.state.current
    requirement_level: required
    note: The verbatim new session state (e.g. "up", "down").
  - ref: network.event.state.previous
    requirement_level: recommended
    note: The verbatim prior session state (e.g. "connecting").
  - ref: network.access.subscriber.id
    requirement_level: opt_in
    note: Opt-in — PII / high cardinality; see the attribute definition.

- id: network.access.pool_exhausted
  ref: network.alarm
  stability: development
  brief: >
    A subscriber address pool reached capacity — new sessions can no longer be assigned an address, a silent onboarding failure. The raised/cleared alarm complementing the `network.access.pool.utilization` gauge and the `network.access.pool.state` (used/free) occupancy.
  note: |
    `network.alarm.cause=table_exhausted` (optionally
    `category=processing_error`) — the same finite-table shape as
    `network.session.table_exhausted` and `network.l2.fdb.limit_exceeded`.
    Associates `network.access.pool` (the exhausted pool, by
    `network.access.pool.id`). `severity=cleared` when addresses free up below
    the ceiling.
  entity_associations:
  - network.access.pool
  attributes:
  - ref: network.alarm.cause
    requirement_level: required
    note: Always `table_exhausted` for this refinement.
  - ref: network.alarm.category
    requirement_level: opt_in
    note: Normally `processing_error` (a resource-limit fault).

- id: network.access.aaa.unreachable
  ref: network.alarm
  stability: development
  brief: >
    A AAA server (RADIUS/Diameter) — or a required DHCP server — became unreachable, so authentication/authorization/accounting (or address assignment) stalls and subscribers cannot come online. The raised/cleared alarm complementing the `network.access.aaa.result` (timeout/error) outcomes on `network.access.aaa.requests`.
  note: |
    `network.alarm.cause=service_unreachable` — a required external service is
    down (the AAA/DHCP onboarding dependency). Associates the NAS/BNG
    `network.device`; carry `network.access.aaa.server.id` and
    `network.access.aaa.server.role` (primary/secondary) so a consumer knows
    whether the device failed over to a backup or lost AAA entirely.
    `severity=cleared` when the server answers again.
  entity_associations:
  - network.device
  attributes:
  - ref: network.alarm.cause
    requirement_level: required
    note: Always `service_unreachable` for this refinement.
  - ref: network.access.aaa.server.id
    requirement_level: recommended
  - ref: network.access.aaa.server.role
    requirement_level: recommended
    note: Whether the unreachable server was the primary or a secondary.
  - ref: network.alarm.specific_problem
    requirement_level: opt_in
