---
file_format: definition/2
attributes:
- key: network.l2.mac.entry.type
  type:
    members:
    - id: dynamic
      value: "dynamic"
      brief: Dynamically learned via data-plane MAC learning.
      stability: development
    - id: static
      value: "static"
      brief: Statically configured.
      stability: development
    - id: control_plane
      value: "control_plane"
      brief: >
        Learned via the control plane (e.g. EVPN MAC/IP advertisement).
      stability: development
  stability: development
  brief: How a MAC forwarding entry was installed.

# --- MAC-move record fields --------------------------------------------
# Carried on the `network.l2.mac.moved` RECORD: a MAC is a
# count, not an entity, so its move is a per-object observation record (it
# names a MAC + old/new port), NOT a state.changed on a durable entity.
- key: network.l2.mac.address
  type: string
  stability: development
  brief: >
    The MAC address the record is about (the moved/limited forwarding entry).
  note: >
    Lowercase, colon-separated. Record/event-level metadata only — a MAC is not an entity and this MUST NOT be a metric dimension (the cardinality firewall).
  examples: ["00:1b:21:3c:4d:5e", "aa:bb:cc:dd:ee:ff"]

- key: network.l2.mac.previous_interface.id
  type: string
  stability: development
  brief: >
    For a `network.l2.mac.moved` record: the `network.interface.id` the MAC was learned on BEFORE the move.
  note: >
    The new/current interface is the reused `network.interface.id` (the port the MAC moved TO); this carries the port it moved FROM, so "MAC X moved from ge-3 to ge-7" is fully expressed.
  examples: ["ge-3", "xe-0/0/1", "ae0"]
