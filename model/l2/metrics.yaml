---
file_format: definition/2
metrics:
- name: network.l2.mac.entries
  stability: development
  brief: >
    Number of MAC forwarding entries currently present.
  note: |
    This metric associates with BOTH `network.vlan` and
    `network.instance`:

    - On a flat 802.1Q switch (no explicit bridging context), report
      per-VLAN occupancy by associating with `network.vlan`. The VLAN
      is the L2 forwarding context.
    - On a device with explicit L2 bridging contexts (VPLS, EVPN
      MAC-VRF), report per-instance occupancy by associating with
      `network.instance` (type `l2vsi` or `l2l3`).
    See docs/entity-model.md (network.instance vs network.vlan).

    Sum across `network.l2.mac.entry.type` gives total occupancy.
    The configured ceiling, when set, is `network.vlan.mac_limit` (per-VLAN)
    or `network.instance.mac_limit` (per bridging instance);
    breaching it raises `network.l2.mac_limit.exceeded`.
  instrument: updowncounter
  unit: "{entry}"
  attributes:
  - ref: network.l2.mac.entry.type
    requirement_level: recommended
  entity_associations:
  - network.vlan
  - network.instance
