---
file_format: definition/2
metrics:
- name: network.interface.io
  stability: development
  brief: >
    Total bytes transmitted or received on the interface.
  note: >
    Aligns with `system.network.io` and `k8s.pod.network.io`: one metric with `network.io.direction` as the dimension, not separate rx/tx names. Monotonically increasing (counter wraps handled by the backend).
  instrument: counter
  unit: "By"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  entity_associations:
  - network.interface

- name: network.interface.packets
  stability: development
  brief: >
    Total packets transmitted or received on the interface.
  instrument: counter
  unit: "{packet}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  entity_associations:
  - network.interface

- name: network.interface.errors
  stability: development
  brief: >
    Total errored packets on the interface.
  note: >
    Includes CRC, frame, runts, giants, and other L1/L2 errors. `error.type` provides optional further classification.
  instrument: counter
  unit: "{error}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  - ref: error.type
    requirement_level: opt_in
  entity_associations:
  - network.interface

- name: network.interface.discards
  stability: development
  brief: >
    Total packets discarded (dropped) on the interface.
  note: >
    Packets dropped due to queue overflow, policy, rate limiting, etc. Not errored — discards are intentional drops by the device.
  instrument: counter
  unit: "{packet}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  entity_associations:
  - network.interface

- name: network.interface.speed
  stability: development
  brief: >
    The current operational link speed of the interface.
  note: |
    The gauge metric representing the *live operational* speed. May differ
    from the `network.interface.speed` entity attribute (configured/
    negotiated speed) when a link degrades, autoneg settles lower, or a
    LAG loses members.

    Comparing metric vs attribute surfaces speed-mismatch faults.
    Always `bit/s`, never `By/s`.
  instrument: gauge
  unit: "bit/s"
  entity_associations:
  - network.interface

- name: network.interface.poe.power.allocated
  stability: development
  brief: >
    The power the PSE has reserved/allocated to the PoE port, in watts.
  note: |
    A gauge (not an attribute) because the primary PoE operational
    view is aggregate: `sum` of allocated across a switch versus the chassis
    PoE budget (`hw.power` on the PSE/PSU) is the budget-headroom signal an
    ops engineer trends and alerts on (e.g. alert at 80% of budget).

    The negotiated reservation the PSE commits against its budget, distinct
    from the *actual* instantaneous draw (`hw.power`, the FRU fact): in
    static-budget mode the PSE reserves against `allocated`, so a class-4 AP
    idling at 8 W still consumes its 30 W reservation. allocated-minus-draw is
    the per-port reserved-but-idle headroom. Slice by the
    `network.interface.poe.*` entity facets (priority/class) for budget-by-
    priority panels.
  instrument: gauge
  unit: "W"
  entity_associations:
  - network.interface

- name: network.interface.poe.power.requested
  stability: development
  brief: >
    The power the PD requested via LLDP-MED, in watts.
  note: |
    A gauge paired with `network.interface.poe.power.allocated`:
    the request-vs-grant gap (`requested` above `allocated`) is the panel that
    explains why a PD runs in a reduced-power mode, and `sum` of requested vs
    the budget is the demand-side capacity view.

    Signalled in the LLDP-MED extended power-via-MDI TLV (ANSI/TIA-1057) \u2014 a
    network discovery fact tied to the authored `model/lldp/`, which `hw.*`
    cannot express. Absent when the PD does not run LLDP-MED (basic-
    classification PoE).
  instrument: gauge
  unit: "W"
  entity_associations:
  - network.interface
