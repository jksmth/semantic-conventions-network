---
file_format: definition/2

# =============================================================================
# FORWARD-PLANNING / REMOVABLE — entity-events machinery (DEC-139)
# -----------------------------------------------------------------------------
# This directory mirrors the merged OpenTelemetry **entity-events** data model
# (opentelemetry-specification #4836: runtime `entity.state` / `entity.delete`
# log events carrying `entity.relationships`). Upstream semconv does NOT yet
# ship an *authorable* model for these (verified 2026-06-09; see
# scratch/entity-events-relationships-design.md §8). We define the one piece
# that is genuinely ours — the network **relationship-type vocabulary** — plus
# removable placeholder stubs (events.yaml) and interim projection metrics
# (metrics.yaml), so producers and consumers have something to align on now.
#
# REMOVE THIS DIRECTORY when upstream ships:
#   (a) an authorable `entity.state` / `entity.delete` event model, AND
#   (b) the automatic entity -> info/state metric projection (then the interim
#       `*.info` metrics in metrics.yaml are superseded).
# Everything here is `development` and is NOT part of any stable surface.
# =============================================================================

attributes:
- key: network.relationship.type
  type:
    members:
    - id: contains
      value: "contains"
      brief: >
        The source entity contains the target as a part (source -> target, parent -> child): a device contains an interface; an interface contains a sub-interface (FK: network.interface.parent.id).
      stability: development
    - id: layered_over
      value: "layered_over"
      brief: >
        The source runs on top of / is encapsulated over the target lower-layer entity (FK: network.interface.lower_layer.id; a tunnel over its underlay instance).
      stability: development
    - id: member_of
      value: "member_of"
      brief: >
        The source is a member of the target aggregate (FK: a member interface -> its network.lag bundle, DEC-028).
      stability: development
    - id: connected_to
      value: "connected_to"
      brief: >
        The source is physically/logically connected to the target (an L1/L2 adjacency discovered by LLDP/CDP; FK: network.link local/remote endpoints). Conceptually two-ended — see Q3.
      stability: development
    - id: adjacent_to
      value: "adjacent_to"
      brief: >
        The source forms a control-plane adjacency with the target (IGP / LLDP neighbour; FK: network.neighbor).
      stability: development
    - id: peers_with
      value: "peers_with"
      brief: >
        The source establishes a peering session with the target (BGP and other session-based protocols; FK: network.neighbor with a session).
      stability: development
    - id: next_hop
      value: "next_hop"
      brief: >
        The source forwards toward the target as a next hop (a route's resolved next-hop interface/neighbour).
      stability: development
  stability: development
  brief: >
    The type of a directional relationship between two network entities, carried in an `entity.state` event's `entity.relationships[]` array (NOT a Resource attribute — "Resource data cannot contain relationship information", spec #4836). An OPEN enum (DEC-002): custom values MAY be used; the well-known set above is the network vocabulary the Networking WG (#3769) owns, and supplies the value set for the generic upstream `relationship.type` field. Generic upstream types (e.g. `depends_on`) MAY also apply.
  note: |
    Direction is source -> target, where the source is the entity emitting
    the `entity.state` event. Placement follows the spec: the relationship is
    emitted on the higher-churn / shorter-lifespan entity (see
    scratch/entity-events-relationships-design.md §4 for the per-edge churn
    ordering and the full FK -> relationship inventory).

    This attribute is the authorable-NOW deliverable. It is defined here as
    an open enum so the vocabulary can be reviewed and carried as event
    payload today, even though a first-class entity -> entity `relationships:`
    authoring field does not exist in Weaver (Q3).
