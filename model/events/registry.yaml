---
file_format: definition/2

# =============================================================================
# entity-events machinery — the entity lifecycle/topology carrier.
# -----------------------------------------------------------------------------
# This directory mirrors the merged OpenTelemetry **entity-events** data model
# (opentelemetry-specification #4836: runtime `entity.state` / `entity.delete`
# log events carrying `entity.relationships`). The events themselves are a
# settled direction upstream, but upstream semconv does NOT yet ship an
# *authorable* model for them — so events.yaml carries
# named placeholder stubs and this file defines the one piece that is genuinely
# ours: the network **relationship-type vocabulary**.
#
# The interim per-entity `*.info` projection metrics that previously lived here
# have moved to their domain packages (network.device.info ->
# model/network/device/metrics.yaml; network.interface.info ->
# model/network/interface/metrics.yaml) and are first-class metrics there.
# They are NOT assumed to be superseded by an automatic entity -> info metric
# projection — that projection is speculative and is not relied on here.
#
# Everything here is `development`. Replace the placeholder events.yaml stubs
# when upstream ships an authorable entity-events model.
# =============================================================================

attributes:
- key: network.relationship.type
  type: string
  stability: development
  brief: >
    The type of a directional relationship between two network entities, carried in an `entity.state` event's `entity.relationships[]` array (NOT a Resource attribute — "Resource data cannot contain relationship information", spec #4836). A loose string with well-known suggested values below; custom values MAY be used, and generic upstream types (e.g. `depends_on`) MAY also apply.
  note: |
    Direction is source -> target, where the source is the entity emitting
    the `entity.state` event. Placement follows the spec: the relationship is
    emitted on the higher-churn / shorter-lifespan entity.

    A free-form string (not a closed enum): the entity-relationship authoring
    surface in Weaver is still emerging, and the vocabulary is expected to
    grow as new entity pairings are modelled. The well-known values below are
    the network vocabulary the Networking WG (#3769) curates and supplies for
    the generic upstream `relationship.type` field; treat them as the
    recommended set, not an exhaustive one.

    Well-known suggested values:
      - `contains`      — the source contains the target as a part
                          (source -> target, parent -> child): a device contains
                          an interface; an interface contains a sub-interface
                          (FK: network.interface.parent.name).
      - `layered_over`  — the source runs on top of / is encapsulated over the
                          target lower-layer entity (FK:
                          network.interface.lower_layer.name; a tunnel over its
                          underlay instance).
      - `member_of`     — the source is a member of the target aggregate (FK: a
                          member interface -> its network.lag bundle).
      - `connected_to`  — the source is physically/logically connected to the
                          target (an L1/L2 adjacency discovered by LLDP/CDP; FK:
                          network.link local/remote endpoints). Conceptually
                          two-ended.
      - `adjacent_to`   — the source forms a control-plane adjacency with the
                          target (IGP / LLDP neighbour; FK: network.neighbor).
      - `peers_with`    — the source establishes a peering session with the
                          target (BGP and other session-based protocols; FK:
                          network.neighbor with a session).
      - `next_hop`      — the source forwards toward the target as a next hop (a
                          route's resolved next-hop interface/neighbour).

    This attribute is the authorable-NOW deliverable: it is carried as event
    payload today even though a first-class entity -> entity `relationships:`
    authoring field does not yet exist in Weaver.
  examples: ["contains", "layered_over", "member_of", "connected_to", "adjacent_to", "peers_with", "next_hop"]
