---
file_format: definition/2
metrics:
- name: network.multicast.routes
  stability: development
  brief: >
    Number of multicast routes (mroutes) in the multicast RIB/FIB, by entry type and address family.
  note: |
    The mroute count — the multicast analogue of `network.routing.routes`, and
    like it a COUNT, never per-route entities: a fabric can hold
    many `(S,G)` states, bounded by active sources/groups (traffic).

    Dimensions:
    - `network.multicast.route.type` — `sg` (`(S,G)`) vs `star_g` (`(*,G)`).
    - `network.address_family` — `ipv4_multicast` / `ipv6_multicast`
      (already authored in network-common; the mroute is control-plane
      routing, so AFI/SAFI applies, not the data-plane `network.type`).

    Associates with `network.instance` (multicast runs within a VRF), which
    with its `network.device` is expected in the same Resource. Per-`(S,G)`
    detail (flags, RPF interface, per-entry counters) is RECORD-level.
  instrument: updowncounter
  unit: "{route}"
  attributes:
  - ref: network.multicast.route.type
    requirement_level: recommended
  - ref: network.address_family
    requirement_level: recommended
  entity_associations:
  - network.instance

- name: network.multicast.groups
  stability: development
  brief: >
    Number of IGMP/MLD group memberships currently joined on an interface.
  note: |
    The bounded occupancy of the group-membership table — which hosts on this
    segment want which groups. Per-group join/leave is an EVENT (deferred with
    the event-envelope package); this is the count.

    Dimension `network.multicast.membership.protocol` (`igmp`/`mld`).
    Associates with `network.interface` (the SVI/routed port where hosts join)
    and `network.instance` for a per-VRF aggregate.
  instrument: updowncounter
  unit: "{group}"
  attributes:
  - ref: network.multicast.membership.protocol
    requirement_level: recommended
  entity_associations:
  - network.interface
  - network.instance

- name: network.multicast.rpf_failures
  stability: development
  brief: >
    Number of multicast packets dropped by the Reverse Path Forwarding (RPF) check.
  note: >
    RPF is the multicast-specific loop-prevention check (a packet must arrive on the interface the unicast route to its source points back out). RPF failures have no unicast analogue and are THE signature multicast fault — typically a unicast-routing vs multicast-topology mismatch. A rising rate is the primary multicast troubleshooting signal. Associates with `network.instance`.
  instrument: counter
  unit: "{packet}"
  entity_associations:
  - network.instance

- name: network.multicast.querier
  stability: development
  brief: >
    The device's elected IGMP/MLD querier role on the interface (enum-as-attribute current-state gauge).
  note: |
    The K8s `status.phase` pattern (as used for ONU/STP/interface state): one
    series per `network.multicast.querier` value, value 1 for the current role.
    An ELECTED ROLE, not a health state — kept off
    `network.neighbor.state` deliberately. Associates with `network.interface`.
  instrument: gauge
  unit: "1"
  attributes:
  - ref: network.multicast.querier
    requirement_level: required
  entity_associations:
  - network.interface
