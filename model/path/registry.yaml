---
file_format: definition/2

# network-path — the CROSS-DEVICE traversal primitive.
#
# Some forwarding objects are not edges between two devices, nor a local source
# endpoint, but an ORDERED PATH that lives ACROSS several devices: an MPLS LSP
# (ingress LER → transit LSRs → egress LER), an SR / SRv6 policy, an RSVP-/SR-TE
# tunnel, an optical lightpath / media channel routed across N ROADM degrees.
# Each device on the path sees only its own segment and its ROLE on it
# (ingress/transit/egress). The model had only the `network.tunnel.type=mpls`
# *token* — but an LSP is not an encap endpoint: it has a head-end + FEC, a
# label stack, a per-hop role, and it spans devices.
#
# Resolution — the cross-device sibling of `network.link`: a `network.path` is
# identity-unscoped (it spans devices, exactly like `network.link`). Each
# device's segment carries the shared `network.path.id`; "the whole path" is a
# query over that id, with no n-ary edge constructed. `network.path.id` is to a
# path what `network.link.id` is to a shared medium and `network.tunnel` is to
# an overlay source — the third face of the one path-over-devices primitive.
# See docs/entity-model.md (sub-entity identity).
#
# Distinct from `network.tunnel` (the device-scoped overlay source endpoint:
# VXLAN VTEP, SD-WAN TLOC) and `network.link` (the topology edge / shared
# medium). Counters do NOT attach here; per-LSP / per-segment traffic
# and TE/protection attributes are the near-term additions, deferred
# with the metrics package.
#
# Prior art: RFC 3031 (MPLS), RFC 8402 (Segment Routing), RFC 9256 (SR Policy),
# RFC 8754 (SRv6), `openconfig-mpls` + `openconfig-network-instance` (te / lsps),
# `openconfig-wavelength-router` (media-channels) + OpenROADM roadm-connections,
# ITU-T G.872 (optical OCh/OMS/OTS), RFC 8345 (path expressed over nodes).

attributes:
# --- Identity ----------------------------------------------------------
- key: network.path.id
  type: string
  stability: development
  brief: >
    Identifier of the path, unique within the reporting/observing scope.
  note: |
    Unlike `network.tunnel` (device-scoped), a path is NOT scoped by a single
    `network.device` — it spans devices, so its identity is just
    `network.path.id` (the `network.link` rule).
    Each device on the path emits its own segment carrying this same id (the
    membership-by-reference convention of `network.link` / `network.lag`), so
    "every hop of this path" is a query over `network.path.id`. Derive it
    from the most stable end the reporter knows — typically the head-end +
    tunnel id (MPLS), the SR-policy (headend, color, endpoint) tuple, or a
    controller-assigned lightpath id.
  examples: ["lsp:PE1->PE2:7001", "srpolicy:PE1|100|2001:db8::2", "lightpath:ROADM-A->ROADM-D:42"]

# --- Classification ----------------------------------------------------
- key: network.path.type
  type:
    members:
    - id: mpls_lsp
      value: "mpls_lsp"
      brief: An MPLS label-switched path (LDP / RSVP-TE signalled).
      stability: development
    - id: sr_policy
      value: "sr_policy"
      brief: A Segment Routing (SR-MPLS) policy / SID-list path.
      stability: development
    - id: srv6_policy
      value: "srv6_policy"
      brief: An SRv6 policy / segment-list path.
      stability: development
    - id: te_tunnel
      value: "te_tunnel"
      brief: >
        A traffic-engineered tunnel (RSVP-TE / SR-TE) carrying TE constraints and protection.
      stability: development
    - id: optical_lightpath
      value: "optical_lightpath"
      brief: >
        An optical media channel / lightpath routed across ROADM degrees (ITU-T G.872).
      stability: development
  stability: development
  brief: >
    The kind of path — what forwarding technology realises the traversal.
  note: >
    Open enum, lowercase, custom values MAY be used. Encap endpoints (VXLAN/IPsec/GRE) are NOT path types — they are `network.tunnel` source endpoints.

- key: network.path.role
  type:
    members:
    - id: ingress
      value: "ingress"
      brief: >
        This device is the head-end / ingress (the LSP ingress LER, the SR-policy headend, the lightpath add port).
      stability: development
    - id: transit
      value: "transit"
      brief: >
        This device is a transit hop (a P/LSR swapping labels, an express ROADM degree).
      stability: development
    - id: egress
      value: "egress"
      brief: >
        This device is the tail-end / egress (the egress LER / PE, the lightpath drop port).
      stability: development
  stability: development
  brief: >
    The role this reporting device plays on the path (its position in the ingress→transit→egress order).
  note: >
    The per-device view: a single path produces one segment per device, each with its own role. Together with `network.path.id` this reconstructs the ordered traversal without an n-ary edge. Open enum, lowercase.

# --- Local termination -------------------------------------------------
- key: network.path.local.device.id
  type: string
  stability: development
  brief: >
    `network.device.id` of this segment's reporting device.
  examples: ["PE1", "P-core-3", "ROADM-A"]

- key: network.path.local.interface.id
  type: string
  stability: development
  brief: >
    `network.interface.id` where the path enters/leaves this device (the in/out interface of the segment, or the add/drop port).
  examples: ["Ethernet1/1", "xe-0/0/3", "och-1/2"]

# --- Signalling + state ------------------------------------------------
- key: network.path.signaling
  type:
    members:
    - id: ldp
      value: "ldp"
      brief: Label Distribution Protocol (RFC 5036).
      stability: development
    - id: rsvp_te
      value: "rsvp_te"
      brief: RSVP-TE (RFC 3209).
      stability: development
    - id: sr
      value: "sr"
      brief: Segment Routing (IGP/BGP-distributed SIDs; no per-LSP signalling).
      stability: development
    - id: bgp
      value: "bgp"
      brief: BGP-signalled (e.g. BGP-LU, SR policy via BGP).
      stability: development
    - id: gmpls
      value: "gmpls"
      brief: GMPLS (optical / TDM control plane).
      stability: development
    - id: controller
      value: "controller"
      brief: Programmed by an SDN controller / PCE / NMS.
      stability: development
    - id: static
      value: "static"
      brief: Statically configured / operator-asserted.
      stability: development
  stability: development
  brief: >
    How the path was signalled or programmed.
  note: >
    The path analogue of `network.link.discovery.protocol`. Distinct from `network.observer.collection.method` (how the telemetry was collected) and from `network.neighbor.protocol` (the adjacency protocol). Open enum, lowercase.

- key: network.path.state
  type:
    members:
    - id: up
      value: "up"
      brief: The path is operational end-to-end (as seen by this segment).
      stability: development
    - id: down
      value: "down"
      brief: The path is down.
      stability: development
    - id: degraded
      value: "degraded"
      brief: >
        Operational but impaired (e.g. running on a backup/FRR path, or below its reserved bandwidth).
      stability: development
    - id: unknown
      value: "unknown"
      brief: State cannot be determined.
      stability: development
  stability: development
  brief: >
    The operational state of the path segment.
  note: >
    The same coarse health vocabulary as `network.neighbor.state` / `network.link.state` (`up·down·degraded·unknown`). TE/protection detail (protected vs protecting, backup active) and the protection-switch event are deferred to the TE/metrics work. Open enum, lowercase. See docs/conventions.md (state modelling).

- key: network.path.native_state
  type: string
  stability: development
  brief: >
    The verbatim, vendor-native path state string.
  examples: ["Up/Active", "Oper-Down", "FRR-active", "admin-down"]

# --- Label/SID transport stack ----------------------------------------
# The forwarding INSTRUCTION the path realises. An LSP/SR-policy/SRv6-policy
# is already a `network.path` (type + role); these carry the label stack /
# SID list / FEC / colour the path is built from. All bounded + low-card →
# attributes, never per-segment entities. For SRv6 the same
# slots simply hold IPv6 SIDs instead of MPLS labels (`type=srv6_policy`
# disambiguates) — no separate SRv6 keys are needed here.
# See docs/conventions.md (cardinality firewall).

- key: network.path.fec
  type: string
  stability: development
  brief: >
    The Forwarding Equivalence Class the path serves — what the head-end binds traffic to this path for.
  note: >
    The destination prefix, VPN, or colour+endpoint the ingress maps onto the LSP/policy (RFC 3031 FEC). The "what is this path for" the bare `network.path.id` does not convey.
  examples: ["10.0.0.0/8", "vpnv4:65000:100:198.51.100.0/24", "color:100,endpoint:2001:db8::2"]

- key: network.path.segment_list
  type: string[]
  stability: development
  brief: >
    The ordered label stack (MPLS), SID list (SR-MPLS), or SRv6 SID list the head-end imposes to realise the path.
  note: >
    The steering instruction, top-of-stack first. Bounded (a SID list is hardware-capped, typically ≤ ~16) → an ordered list attribute (the `network.lag.members[]` / `network.stp.instance.vlans[]` precedent), NOT per-segment entities and NOT a count. MPLS values are labels; SR-MPLS values are SIDs/labels; SRv6 values are IPv6 SIDs. Carried at the `ingress` segment (the head-end that imposes it).
  examples: [["16001", "16002", "24012"], ["2001:db8:a::", "2001:db8:b:f1::"]]

- key: network.path.color
  type: int
  stability: development
  brief: >
    The SR-Policy colour (RFC 9256) — the intent/steering key that, with the endpoint, selects this policy.
  note: >
    The 32-bit colour an SR policy advertises so services (a coloured BGP route) steer onto it. SR-specific; absent for a plain LDP/RSVP LSP. Distinct from `network.path.te.affinity` (the TE admin-group link constraint) despite the shared word "colour".
  examples: [100, 200]

- key: network.path.binding_sid
  type: string
  stability: development
  brief: >
    The Binding-SID (BSID) that represents the whole policy to its steering clients — the single label/SID an upstream node pushes to enter the path.
  examples: ["15000", "2001:db8:a:e000::"]

# --- Per-device segment view (the LFIB / My-SID row) -------------------
# The path spans devices; each device sees only its own segment's operation.
# in→out = swap (transit), ∅→out = push (ingress), in→∅ = pop (egress/PHP).

- key: network.path.local.in_segment
  type: string
  stability: development
  brief: >
    The incoming label/SID this device matches on for this path segment (the LFIB in-label; absent at an ingress that only pushes).
  examples: ["16002", "2001:db8:b:f1::"]

- key: network.path.local.out_segment
  type: string
  stability: development
  brief: >
    The outgoing label/SID this device imposes for this path segment (absent at an egress that pops to IP).
  examples: ["24012", "implicit-null"]

- key: network.path.label.operation
  type:
    members:
    - id: push
      value: "push"
      brief: Impose one or more labels/SIDs (the ingress LER operation).
      stability: development
    - id: swap
      value: "swap"
      brief: Replace the top label/SID (the transit LSR operation).
      stability: development
    - id: pop
      value: "pop"
      brief: Remove the top label/SID (egress / penultimate-hop-popping).
      stability: development
  stability: development
  brief: >
    The MPLS/SR label-stack operation, used as the dimension on `network.path.label.operations`.
  note: >
    The transit LSR's entire workload is `swap`; `push`/`pop` are the ingress/egress imposition/disposition. Open enum, lowercase.

# --- Traffic-engineering constraints -----------------------------------
# Low-card config the path was computed/signalled against; hang on the path.

- key: network.path.bandwidth.reserved
  type: int
  stability: development
  brief: >
    The reserved/signalled bandwidth of the path, in bits per second (RSVP-TE reservation or SR-TE configured rate).
  note: "Unit `bit/s` (an `int`, the `network.interface.speed` attribute precedent)."
  examples: [1000000000, 10000000000]

- key: network.path.te.metric
  type: int
  stability: development
  brief: >
    The TE metric the path was computed against (distinct from the IGP metric).
  examples: [100, 4000]

- key: network.path.te.affinity
  type: string
  stability: development
  brief: >
    The TE affinity / admin-group constraint (include/exclude link-colour bitmask) the path was computed under.
  note: >
    The link-attribute constraint of CSPF (RFC 3209 / RFC 7308). Distinct from `network.path.color` (the SR-Policy intent colour). Carried verbatim (hex mask or named affinity set).
  examples: ["0x00000005", "red,!blue"]

- key: network.path.srlg
  type: string[]
  stability: development
  brief: >
    The Shared-Risk Link Groups the path traverses or is constrained to avoid (the diverse-path constraint).
  examples: [["100", "205"], ["conduit-A", "conduit-B"]]

- key: network.path.computation
  type:
    members:
    - id: explicit
      value: "explicit"
      brief: Operator-specified explicit route (ERO / strict-hop list).
      stability: development
    - id: dynamic
      value: "dynamic"
      brief: Head-end CSPF / dynamic computation.
      stability: development
    - id: pce
      value: "pce"
      brief: Computed by an external PCE / controller (PCEP).
      stability: development
    - id: sr_native
      value: "sr_native"
      brief: Native SR shortest-path (IGP SIDs, no explicit computation).
      stability: development
  stability: development
  brief: >
    How the path was computed.
  note: >
    The computation analogue of `network.path.signaling` (how it was *signalled*). Open enum, lowercase.

# --- FRR / TI-LFA protection -------------------------------------------
# The sub-50 ms resilience plane. Coarse `network.path.state=degraded`
# already covers "running on a backup"; these add the protection detail.

- key: network.path.protection.role
  type:
    members:
    - id: unprotected
      value: "unprotected"
      brief: The path has no backup.
      stability: development
    - id: protected
      value: "protected"
      brief: A primary path that has a backup available.
      stability: development
    - id: protecting
      value: "protecting"
      brief: This path IS the backup for a protected primary.
      stability: development
  stability: development
  brief: >
    The path's role in the protection relationship.
  note: >
    The protected-vs-protecting axis. Open enum, lowercase.

- key: network.path.protection.type
  type:
    members:
    - id: frr
      value: "frr"
      brief: MPLS Fast Reroute (RFC 4090), unspecified style.
      stability: development
    - id: ti_lfa
      value: "ti_lfa"
      brief: Topology-Independent LFA (SR fast-reroute).
      stability: development
    - id: one_to_one
      value: "one_to_one"
      brief: RFC 4090 one-to-one (detour) backup.
      stability: development
    - id: facility
      value: "facility"
      brief: RFC 4090 facility (bypass) backup.
      stability: development
    - id: none
      value: "none"
      brief: No protection configured.
      stability: development
  stability: development
  brief: >
    The fast-reroute / protection mechanism guarding the path.
  note: "Open enum, lowercase."

- key: network.path.protection.active
  type: boolean
  stability: development
  brief: >
    Whether the backup path is currently carrying traffic (a protection switch has occurred and not yet reverted).
  note: >
    When `true`, `network.path.state` SHOULD be `degraded` — the "up-but-impaired / running on a backup" case the path registry already reserves. The two agree: one coarse health value, one specific signal.
