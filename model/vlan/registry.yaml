---
file_format: definition/2
attributes:
- key: network.vlan.id
  type: int
  stability: development
  brief: >
    The 802.1Q VLAN identifier (tag), unique within the device.
  note: |
    Full identity of a VLAN entity is the pair (`network.device.id`,
    `network.vlan.id`). The owning `network.device` entity is expected
    in the same Resource.

    Range: 1–4094 (per IEEE 802.1Q).
  examples: [1, 100, 3001]

- key: network.vlan.name
  type: string
  stability: development
  brief: >
    A human-readable name assigned to the VLAN.
  note: >
    Operator-configured; mutable. Not used for identity.
  examples: ["default", "Guest", "Server-Farm", "MGMT"]

# --- QinQ / provider-bridging tag classification -----------------------
- key: network.vlan.tag.role
  type:
    members:
    - id: customer
      value: "customer"
      brief: >
        A customer VLAN (C-VLAN) — the inner/802.1Q tag in provider bridging, the ordinary enterprise VLAN.
      stability: development
    - id: service
      value: "service"
      brief: >
        A service VLAN (S-VLAN) — the outer/802.1ad tag a provider pushes to tunnel a customer's traffic (QinQ).
      stability: development
  stability: development
  brief: >
    The role this VLAN's tag plays in 802.1ad provider bridging (QinQ): customer (C-VLAN) vs service (S-VLAN).
  note: |
    The S-tag/C-tag distinction, a property of how the VLAN is used
    on this device, NOT a forwarding-construct type. Orthogonal to the
    switchport `network.interface.vlan.mode`: a `dot1q_tunnel` port pushes a
    VLAN whose `tag.role=service`. Absent on a plain enterprise switch (every
    VLAN is implicitly a customer/802.1Q VLAN). Open enum, lowercase. The
    802.1ah backbone (B-VLAN / I-SID, mac-in-mac) is a deferred metro
    increment, not a value here yet.

- key: network.vlan.tag.ethertype
  type:
    members:
    - id: dot1q
      value: "0x8100"
      brief: 802.1Q C-tag TPID (0x8100).
      stability: development
    - id: dot1ad
      value: "0x88a8"
      brief: 802.1ad S-tag TPID (0x88A8).
      stability: development
    - id: legacy_9100
      value: "0x9100"
      brief: Legacy QinQ S-tag TPID (0x9100).
      stability: development
    - id: legacy_9200
      value: "0x9200"
      brief: Legacy QinQ S-tag TPID (0x9200).
      stability: development
  stability: development
  brief: >
    The tag protocol identifier (TPID/ethertype) carried by this VLAN's tag.
  note: >
    The wire TPID, lowercase hex. C-VLANs use `0x8100`; 802.1ad S-VLANs use `0x88a8`; `0x9100`/`0x9200` are legacy QinQ S-tag values. Mirrors OpenConfig `oc-vlan-types` TPID identities. Open enum — custom values MAY be used for proprietary TPIDs.

# --- Per-VLAN MAC limit ------------------------------------------------
- key: network.vlan.mac_limit
  type: int
  stability: development
  brief: >
    Configured maximum number of MAC addresses that may be learned in this VLAN, if a per-VLAN limit is set.
  note: >
    The per-VLAN twin of `network.instance.mac_limit`: the configured ceiling the per-VLAN `network.l2.mac.entries` occupancy fills toward, and the threshold behind `network.l2.mac_limit.exceeded`. Bounded and descriptive — a config attribute on the VLAN entity, not a metric. Per-VLAN MAC limiting is common on access/metro switches for security.
  examples: [1000, 8192]

