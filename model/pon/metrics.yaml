---
file_format: definition/2
metrics:
- name: network.pon.onu.rssi
  stability: development
  brief: >
    Received signal strength indication (RSSI) of an ONU's upstream burst, measured at the OLT.
  note: |
    The OLT's per-ONU measurement of each ONU's upstream burst optical
    power — the standard PON term is RSSI (Received Signal Strength
    Indication, ITU-T/BBF; vendor "per-ONU RSSI") — and the primary PON
    troubleshooting signal ("ONU 14's upstream light is low"). Unit
    `dB[mW]` (UCUM).

    Named `rssi` rather than `*.rx_power` with a direction: it is
    a receive-only, head-end measurement with no transmit counterpart, so a
    `network.io.direction` attribute does not apply — unlike the endpoint
    `network.optical.power`, which is bidirectional and carries direction.
    It is also distinct from the ONU's own downstream received power
    (`network.optical.power`, `receive`, measured at the ONU); comparing the
    ONU's upstream launch power (`network.optical.power`, `transmit`) with
    this RSSI yields the upstream span loss.

    Associates with the ONU's `network.optical.channel` (upstream carrier).
    The ONU is the subject; this value is OLT-measured and relayed (OLT is
    `network.observer`, `collection.method = omci`).
  instrument: gauge
  unit: "dB[mW]"
  entity_associations:
  - network.optical.channel

- name: network.pon.fec.corrected
  stability: development
  brief: >
    FEC-corrected codewords on the PON, by direction.
  note: >
    The PON forward-error-correction layer (the analogue of coherent BER, which is direct-detect PON does not use). A rising corrected rate is the early optical-degradation signal; sustained correction precedes uncorrectable errors. `network.io.direction` separates upstream (ONU→OLT) from downstream (OLT→ONU).
  instrument: counter
  unit: "{codeword}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  entity_associations:
  - network.optical.channel

- name: network.pon.fec.uncorrectable
  stability: development
  brief: >
    Uncorrectable FEC codewords on the PON, by direction.
  note: >
    Codewords FEC could not correct — errored data reaching the receiver. The PON equivalent of post-FEC BER crossing zero. `network.io.direction` separates upstream from downstream.
  instrument: counter
  unit: "{codeword}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  entity_associations:
  - network.optical.channel

- name: network.pon.bip.errors
  stability: development
  brief: >
    BIP-8 (bit-interleaved parity) errored blocks on the PON, by direction.
  note: >
    The PON link bit-error indicator (ITU-T G.984/G.9807.1 BIP-8). A lower-overhead error signal than FEC counters, available on PONs without FEC enabled. `network.io.direction` separates upstream from downstream.
  instrument: counter
  unit: "{error}"
  attributes:
  - ref: network.io.direction
    requirement_level: required
  entity_associations:
  - network.optical.channel

- name: network.pon.onu.state
  stability: development
  brief: >
    The ONU's current activation state on the PON (enum-as-attribute status metric — UpDownCounter, per the OTel status-metrics guide).
  note: |
    The K8s `status.phase` pattern (as used for STP and interface state):
    one series per possible `network.pon.onu.state` value, value 1 for the
    ONU's current state. `network.pon.onu.native_state` carries the verbatim
    vendor term. The state machine fit (offline→ranging→operational) mirrors
    the OLT's view; the OLT is `network.observer` (`collection.method=omci`).

    The online/offline transition *event* is authored in
    `model/pon/events.yaml` (`network.pon.onu.state.changed`).
  instrument: updowncounter
  unit: "1"
  attributes:
  - ref: network.pon.onu.state
    requirement_level: required
  - ref: network.pon.onu.native_state
    requirement_level: opt_in
  entity_associations:
  - network.device

- name: network.pon.onu.distance
  stability: development
  brief: >
    Fibre distance from the OLT to the ONU, derived from PON ranging.
  note: >
    The ranging (equalisation-delay) distance to the ONU — a per-ONU physical/inventory value ("ONU is 18.4 km out") and a fault signal (a jump indicates a fibre/splice change). OLT-measured.
  instrument: gauge
  unit: "m"
  entity_associations:
  - network.device

- name: network.pon.dba.granted
  stability: development
  brief: >
    Upstream bandwidth currently granted to the ONU/T-CONT by Dynamic Bandwidth Allocation (DBA).
  note: >
    The DBA grant — what the OLT has allocated upstream. Per-ONU when `network.pon.tcont.id` is absent; per-T-CONT when present. Compared with `network.pon.dba.used` this is the PON upstream capacity/congestion signal.
  instrument: gauge
  unit: "bit/s"
  attributes:
  - ref: network.pon.tcont.id
    requirement_level: opt_in
  entity_associations:
  - network.device

- name: network.pon.dba.used
  stability: development
  brief: >
    Upstream bandwidth actually used by the ONU/T-CONT.
  note: >
    Actual consumed upstream bandwidth, against the DBA grant (`network.pon.dba.granted`). used/granted is the upstream utilisation.
  instrument: gauge
  unit: "bit/s"
  attributes:
  - ref: network.pon.tcont.id
    requirement_level: opt_in
  entity_associations:
  - network.device
