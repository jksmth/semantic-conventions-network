---
file_format: definition/2

# network-pon (optical subset) — PON access optics for OLT and ONU/ONT.
#
# Scope: the OPTICAL layer of PON only. Most PON optics REUSES the
# endpoint model and is not redefined here:
#   - OLT PON-port downstream Tx + ONU downstream Rx + ONU upstream Tx are
#     ordinary `network.optical.channel` + `network.optical.power` (direction),
#     with `network.optical.wavelength` carrying the PON band plan
#     (GPON 1490↓/1310↑, XGS-PON 1577↓/1270↑).
#   - module temp/Vcc/status → hw.*.
# This package adds only the genuinely PON-specific optical signals: the
# burst-mode upstream RSSI (a head-end measurement) and PON BIP-8/FEC link
# quality (the PON analogue of coherent BER).
#
# Producer≠subject: ONU optical telemetry is measured by the OLT and relayed
# over OMCI. The ONU is the subject (its own `network.device`, role=onu); the
# OLT is `network.observer` with `collection.method=omci`. No new
# producer≠subject machinery — `omci` added to the observer enum.
# See docs/entity-model.md (entity catalogue).
#
# Deferred to the full `network-access` package (do NOT reshape this optical
# layer): the GEM/T-CONT/Alloc-ID service-mapping plane. PON events —
# ONU online/offline and dying-gasp/LOS — are now AUTHORED in
# `model/pon/events.yaml` as refinements of the shared event envelope
# (`network.pon.onu.state.changed` / `network.pon.onu.dying_gasp`).
# The ONU activation/ranging state
# and DBA bandwidth are now authored here; the 1:N ODN
# relationship is the authored `network.link` (topology=point_to_multipoint),
# with `network.pon.id` as the link id — only the ODN/splitter
# physical-plant detail remains deferred.
#
# Prior art: ITU-T G.984 (GPON) / G.9807.1 (XGS-PON) / G.988 (OMCI),
# BBF TR-385 / bbf-xpon YANG.

attributes:
- key: network.pon.type
  type:
    members:
    - id: gpon
      value: "gpon"
      brief: ITU-T G.984 GPON (2.488G↓ / 1.244G↑).
      stability: development
    - id: xgpon
      value: "xgpon"
      brief: ITU-T G.987 XG-PON (10G↓ / 2.5G↑, asymmetric).
      stability: development
    - id: xgspon
      value: "xgspon"
      brief: ITU-T G.9807.1 XGS-PON (10G symmetric).
      stability: development
    - id: ngpon2
      value: "ngpon2"
      brief: ITU-T G.989 NG-PON2 (tunable, multi-wavelength TWDM).
      stability: development
    - id: epon
      value: "epon"
      brief: IEEE 802.3ah EPON (1G).
      stability: development
    - id: teng_epon
      value: "10g_epon"
      brief: IEEE 802.3av 10G-EPON.
      stability: development
  stability: development
  brief: >
    The PON standard of the port/ONU, which sets the upstream/downstream wavelength plan and line rate.
  note: >
    Open enum, lowercase. A descriptor of the OLT PON port and the ONUs on it. The specific wavelengths are carried by `network.optical.wavelength` on each channel; this attribute names the standard (and hence the band plan / coexistence regime).

- key: network.pon.onu.id
  type: int
  stability: development
  brief: >
    The ONU-ID assigned to the ONU on its PON port (ITU-T G.984.3 / G.9807.1), unique within the PON port.
  note: >
    A PON-local identifier (the on-tree address), distinct from the ONU's global `network.device.id` (the ONU is its own `network.device`, role=onu). Useful for correlating per-ONU measurements to the OLT's view of the tree. The ONU's membership on the tree is the general point-to-multipoint topology relationship: the ONU carries the PON link's `network.link.id` (= `network.pon.id`).
  examples: [1, 14, 127]

# --- ONU tree address (PON-specific) -----------------------------------
# An ONU is a network.device (role=onu). "Which OLT reports/serves it" is
# the GENERAL observer relationship (network.observer.id, mandatory when
# producer≠subject) — NOT a PON-specific parent id. The
# attributes below carry only the genuinely PON-specific on-tree address;
# the physical ONU↔OLT-port 1:N attachment is the general topology link
# (`network.link`, topology=point_to_multipoint), with
# `network.pon.id` as that link's id.
- key: network.pon.id
  type: string
  stability: development
  brief: >
    Identifier of the PON / optical distribution network (ODN tree) the ONU is attached to, scoped to its OLT.
  note: >
    Typically the OLT's PON port (e.g. the `network.interface.id` of the PON port, `gpon-4/0`). This is the **`network.link.id` of the point-to-multipoint PON link**: the OLT emits a `network.link` with `topology=point_to_multipoint`, `local.device.id`=the OLT, `local.interface.id`=the PON port, and each ONU references it by carrying this `network.pon.id`. Together with `network.observer.id` (the reporting OLT) and `network.pon.onu.id` this locates the ONU on the tree, and makes "every ONU on this PON" a query (filter by `network.pon.id`). The ODN / splitter as a physical-plant object (fibre runs, splitter stages) remains deferred to `network-access`; the 1:N relationship itself is now the authored `network.link`.
  examples: ["gpon-4/0", "xgs-4/2"]

# --- ONU activation state (the PON control plane) ----------------------
- key: network.pon.onu.state
  type:
    members:
    - id: offline
      value: "offline"
      brief: >
        The ONU is not present / not detected on the PON (ITU-T G.984.3 O1 Initial, or absent).
      stability: development
    - id: standby
      value: "standby"
      brief: Powered and waiting for activation (O2 Standby).
      stability: development
    - id: ranging
      value: "ranging"
      brief: >
        Registering / serial-number / ranging — the OLT is measuring round-trip delay and admitting the ONU (O3/O4).
      stability: development
    - id: operational
      value: "operational"
      brief: Activated and carrying traffic (O5 Operation).
      stability: development
    - id: emergency_stop
      value: "emergency_stop"
      brief: >
        Laser administratively shut down by the OLT (O7) — e.g. a rogue ONU. A forced-down condition, not a fault of the ONU's own.
      stability: development
    - id: unknown
      value: "unknown"
      brief: State cannot be determined.
      stability: development
  stability: development
  brief: >
    The ONU's activation state on the PON.
  note: >
    The normalized PON ONU activation state (ITU-T G.984.3 / G.9807.1). A dedicated enum, not the coarse `network.neighbor.state`: `ranging` and `emergency_stop` carry PON-specific meaning that `up`/`down` would lose. The verbatim vendor term is preserved in `network.pon.onu.native_state`. The online↔offline transition *event* is authored in `model/pon/events.yaml` (`network.pon.onu.state.changed`). See docs/conventions.md (state modelling).

- key: network.pon.onu.native_state
  type: string
  stability: development
  brief: >
    The verbatim, vendor-native ONU activation state string.
  examples: ["O5-Operation", "O4-Ranging", "emergency-stop", "los"]

# --- DBA (upstream bandwidth) ------------------------------------------
- key: network.pon.tcont.id
  type: int
  stability: development
  brief: >
    The T-CONT (Transmission Container) identifier — the upstream bandwidth container DBA grants against — within the ONU.
  note: >
    Optional dimension for per-T-CONT DBA bandwidth. When absent, DBA metrics are per-ONU aggregates. The full GEM-port / T-CONT / Alloc-ID service-mapping model is deferred to `network-access`; this is only the bandwidth-accounting handle. See docs/conventions.md (cardinality firewall).
  examples: [0, 1, 4]
