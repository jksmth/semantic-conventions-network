---
file_format: definition/2

# network-sr — the device-local Segment-Routing / SRv6 SID plane.
#
# This package mints NO entity (the `network.routing` / `network.l3` /
# `network.multicast` pattern): SR/SRv6 add attributes to the entities that
# already own the SIDs, plus one count. The PATH-borne label/SID stack lives on
# `network.path` (segment_list, in/out_segment, colour, binding_sid); THIS
# package carries what the device itself allocates and advertises into the IGP:
#
#   - prefix/node SID   → on the loopback `network.interface` (and `network.instance`)
#   - adjacency SID     → on `network.neighbor` (per IGP adjacency)
#   - SRGB / SRLB block → range attrs here; OCCUPANCY is `network.component.utilization`
#                         (resource=srgb/srlb/mpls_label, the table-fill family)
#   - SRv6 locator      → on the loopback interface / instance
#   - SRv6 SID function → on the local SID table, counted by `network.sr.sids`
#
# The SRv6 SID's three-faced nature — it is simultaneously an IPv6 address, a
# routing prefix (the locator appears in `network.routing.routes`), and a
# forwarding function — is DOCUMENTED and related by value, NEVER triple-counted
# (the EVPN-Type-2 dual-population rule, one plane over).
#
# Prior art: RFC 8402 (SR architecture: SRGB/SRLB, prefix/node/adjacency SID),
# RFC 9256 (SR Policy), RFC 8667 (IS-IS SR), RFC 8754/8986 (SRv6 SRH + network
# programming functions), RFC 9352 (IS-IS SRv6); openconfig-segment-routing.

attributes:
# --- SR-MPLS SIDs (anchored on the entity that owns them) --------------
- key: network.sr.prefix_sid
  type: string
  stability: development
  brief: >
    The prefix-SID / node-SID advertised for a loopback prefix (the device's SR identity in the IGP).
  note: >
    Carried on the loopback `network.interface` (and/or `network.instance`) that owns the prefix. A label (index into the SRGB) for SR-MPLS. The node-SID is the prefix-SID of the router's primary loopback.
  examples: ["16001", "100"]

- key: network.sr.adjacency_sid
  type: string
  stability: development
  brief: >
    The adjacency-SID allocated for an IGP adjacency (steers a packet onto one specific link).
  note: >
    Carried on the `network.neighbor` (the IS-IS/OSPF adjacency). Typically drawn from the SRLB (local, non-global). May be protected or unprotected.
  examples: ["24012", "24013"]

# --- SRGB / SRLB block ranges (occupancy via component.utilization) ----
- key: network.sr.srgb.lower
  type: int
  stability: development
  brief: Lower bound (first label) of the Segment Routing Global Block.
  examples: [16000]

- key: network.sr.srgb.upper
  type: int
  stability: development
  brief: Upper bound (last label) of the Segment Routing Global Block.
  note: >
    The SRGB is a finite, exhaustible label block. Its OCCUPANCY is reported via `network.component.utilization` with `network.component.resource=srgb` (the table-fill family) — not a new metric here; these two attributes carry the configured range (descriptive, like a configured interface speed).
  examples: [23999]

- key: network.sr.srlb.lower
  type: int
  stability: development
  brief: Lower bound of the Segment Routing Local Block (for adjacency/local SIDs).
  examples: [15000]

- key: network.sr.srlb.upper
  type: int
  stability: development
  brief: >
    Upper bound of the Segment Routing Local Block. Occupancy via `network.component.utilization` (`resource=srlb`).
  examples: [15999]

# --- SRv6 (locator + SID function) -------------------------------------
- key: network.srv6.locator
  type: string
  stability: development
  brief: >
    The SRv6 locator — the IPv6 prefix from which the device allocates its SRv6 SIDs (advertised into the IGP/BGP).
  note: >
    Carried on the loopback `network.interface` / `network.instance`. The locator is simultaneously an IPv6 prefix that appears once in `network.routing.routes` — documented, not double-counted.
  examples: ["2001:db8:a::/48", "fc00:0:1::/48"]

- key: network.srv6.sid.function
  type:
    members:
    - id: end
      value: "end"
      brief: "END — the SRv6 endpoint (shortest-path to the next segment)."
      stability: development
    - id: end_x
      value: "end_x"
      brief: "END.X — L3 cross-connect to a specific adjacency."
      stability: development
    - id: end_dt4
      value: "end_dt4"
      brief: "END.DT4 — decapsulate and IPv4 table lookup (L3VPN IPv4)."
      stability: development
    - id: end_dt6
      value: "end_dt6"
      brief: "END.DT6 — decapsulate and IPv6 table lookup (L3VPN IPv6)."
      stability: development
    - id: end_dt46
      value: "end_dt46"
      brief: "END.DT46 — decapsulate and IP table lookup (dual-stack VPN)."
      stability: development
    - id: end_dx4
      value: "end_dx4"
      brief: "END.DX4 — decapsulate and IPv4 cross-connect."
      stability: development
    - id: end_dx6
      value: "end_dx6"
      brief: "END.DX6 — decapsulate and IPv6 cross-connect."
      stability: development
    - id: end_dx2
      value: "end_dx2"
      brief: "END.DX2 — decapsulate and L2 cross-connect (EVPN VPWS)."
      stability: development
    - id: un
      value: "un"
      brief: "uN — the micro-SID (uSID) shortest-path behaviour."
      stability: development
    - id: ua
      value: "ua"
      brief: "uA — the micro-SID adjacency cross-connect behaviour."
      stability: development
  stability: development
  brief: >
    The SRv6 endpoint behaviour (function) a local SID executes (RFC 8986).
  note: >
    The forwarding instruction half of the SRv6 SID's address/route/function fusion. Used as the dimension on `network.sr.sids`. Open enum, lowercase; custom values MAY be used for vendor/uSID behaviours not listed.
