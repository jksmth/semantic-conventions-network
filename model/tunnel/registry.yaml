---
file_format: definition/2

# network-tunnel — the overlay SOURCE-ENDPOINT primitive.
#
# An overlay edge (a VXLAN VTEP, an SD-WAN TLOC, a configured GRE/IPsec head)
# is anchored on ONE device: a local source address that either terminates a
# single configured point-to-point tunnel OR anchors a DYNAMICALLY-DISCOVERED
# full mesh of tunnels (one per remote endpoint, learned via EVPN Type-3 / OMP,
# not provisioned). The pre-existing `network.tunnel.type` *token*
# (id/type/src/dst/vni) is shaped for the single, configured, point-to-point
# case only — forcing a discovered mesh into it yields either N×(N−1) phantom
# tunnel entities nobody provisioned, or one tunnel with no real `dst`.
#
# Resolution — the overlay-tier twin of the 1:N fix:
# the entity is the LOCAL SOURCE ENDPOINT, owned and emitted by this device
# (device-scoped identity — it is the local anchor). The
# DISCOVERED PEER SET is NOT entities: per-peer / per-transport-class telemetry
# is carried as metric DIMENSIONS / records (the cardinality firewall — a
# 10⁴-tunnel mesh cannot be 10⁴ entities, the same reasoning that
# keeps flows and sessions off the entity store). For a classic single
# configured tunnel the one remote is carried directly as
# `network.tunnel.peer.address`.
#
# Distinct from `network.path` (the CROSS-DEVICE ingress→transit→egress
# traversal: MPLS LSP, SR policy, optical lightpath). A tunnel is a local
# source you fully own; a path spans devices and is identity-unscoped like
# `network.link`. Keeping them split mirrors the `network.link` (edge, no
# counters) vs `network.interface` (counters) discipline.
#
# An anycast/MLAG-shared VTEP source address is the orthogonal "deliberately
# replicated identity" concern — handled by the never-reconcile-on-
# shared-address rule, not here.
#
# Per-peer/per-VNI counters, tunnel/BFD up-down events, and the path-change /
# SLA-violation event are deferred with the metrics/events packages
# (as for `network.link`, which carries topology + state only).
#
# Prior art: RFC 7348 (VXLAN), RFC 8365 (EVPN-VXLAN), RFC 8926 (Geneve),
# Cisco SD-WAN OMP/TLOC, `openconfig-network-instance` (vxlan / encapsulation),
# TR-181 tunnel objects.

attributes:
# --- Identity ----------------------------------------------------------
- key: network.tunnel.id
  type: string
  stability: development
  brief: >
    Identifier of the local tunnel source endpoint, unique within the owning device.
  note: |
    A device-scoped sub-entity: the full identity is
    (`network.device.id`, `network.tunnel.id`), and the owning
    `network.device` MUST be present in the same Resource. Derive it from
    the most stable local anchor:
    - VXLAN VTEP: the source/loopback IP (or its interface id);
    - SD-WAN TLOC: `system-ip` + `color` (the TLOC tuple);
    - configured GRE/IPsec: the tunnel interface id.
  examples: ["vtep:10.0.0.7", "tloc:10.1.1.1:mpls", "Tunnel0"]

# --- Classification ----------------------------------------------------
- key: network.tunnel.type
  type:
    members:
    - id: vxlan
      value: "vxlan"
      brief: VXLAN (RFC 7348), typically an EVPN-discovered VTEP mesh.
      stability: development
    - id: geneve
      value: "geneve"
      brief: Geneve (RFC 8926).
      stability: development
    - id: gre
      value: "gre"
      brief: GRE (RFC 2784), usually a configured point-to-point tunnel.
      stability: development
    - id: ipsec
      value: "ipsec"
      brief: >
        IPsec tunnel / SA, e.g. an SD-WAN OMP-discovered TLOC mesh or a site-to-site VPN.
      stability: development
    - id: l2tp
      value: "l2tp"
      brief: L2TP (RFC 2661 / RFC 3931).
      stability: development
    - id: wireguard
      value: "wireguard"
      brief: WireGuard.
      stability: development
  stability: development
  brief: >
    The encapsulation type of the tunnel source endpoint.
  note: >
    Open enum, lowercase, custom values MAY be used. This is the overlay encap the device originates; the underlay transport it rides is the ordinary interface/routing model. MPLS/SR label-switched and optical paths are NOT tunnel types here — they are `network.path` (cross-device traversal).

- key: network.tunnel.source.address
  type: string
  stability: development
  brief: >
    The local underlay source address of the tunnel endpoint (the VTEP source IP, the TLOC system-ip, the tunnel-source of a GRE/IPsec head).
  note: >
    Reuses the universal address vocabulary. This is the stable local anchor the discovered mesh (or single peer) is built from.
  examples: ["10.0.0.7", "192.0.2.1", "2001:db8::1"]

- key: network.tunnel.transport_class
  type: string
  stability: development
  brief: >
    The transport class / color of the endpoint — the underlay it is reachable over (SD-WAN `color`).
  note: >
    An SD-WAN TLOC is keyed by (system-ip, color, encap); `color` (e.g. `mpls`, `biz-internet`, `lte`) names the underlay transport and is the per-transport dimension app-route/SLA policy selects on. Open string, lowercase.
  examples: ["mpls", "biz-internet", "lte", "public-internet"]

- key: network.tunnel.vni
  type: int
  stability: development
  brief: >
    The VXLAN Network Identifier (or equivalent virtual-network id) the endpoint carries.
  note: >
    The VNI↔`network.instance` (l2vsi/l3vrf) binding is the authored instance model; this is the on-the-wire identifier. For per-VNI traffic this is a metric dimension, not a separate entity.
  examples: [10100, 50001]

# --- Underlay binding (overlay-rides-underlay) -------------------------
- key: network.tunnel.underlay.instance
  type: string
  stability: development
  brief: >
    The `network.instance.name` of the underlay routing context in which the endpoint's `source.address` (and the discovered peer set) is reachable.
  note: |
    The id-reference half of the overlay↔underlay binding.
    A Clos fabric is two networks stacked — a VXLAN/EVPN overlay on an IP+ECMP
    underlay — and this binds the overlay SOURCE endpoint to the underlay
    context it rides (almost always `default`). The full overlay-rides-underlay
    chain reconstructs by id with no new relationship entity: an overlay
    `network.instance` (the l2vsi/l2l3 MAC-VRF/IRB) → its VTEP `network.tunnel`
    (by `network.tunnel.vni`) → the underlay `network.instance` (by this
    attribute). The same membership-by-reference move as
    `network.interface.lower_layer.id[]`, at the instance/tunnel grain it
    does not cover.

    DEFERRED (NOT this attribute): the per-remote-VTEP ECMP path count /
    load-balance across the underlay (central on a fabric but deferred with
    the TE/protection set), and the *typed* overlay-rides-underlay
    relationship (the OTel edge model). This id reference is the portable
    workaround until then.
  examples: ["default", "underlay"]

# --- Peer (single configured tunnel only) ------------------------------
- key: network.tunnel.peer.address
  type: string
  stability: development
  brief: >
    The remote underlay address, for a single configured point-to-point tunnel (GRE / site-to-site IPsec).
  note: >
    Present ONLY when the endpoint terminates one configured peer. For a DISCOVERED MESH (EVPN VTEP, OMP TLOC) it is ABSENT on the entity — the many peers are metric dimensions on per-peer counters (per remote VTEP / per TLOC-pair), never N tunnel entities. This is the crux of the discovered-mesh case.
  examples: ["198.51.100.2", "2001:db8::2"]

# --- State -------------------------------------------------------------
- key: network.tunnel.state
  type:
    members:
    - id: up
      value: "up"
      brief: The endpoint / tunnel is operational.
      stability: development
    - id: down
      value: "down"
      brief: The endpoint / tunnel is down.
      stability: development
    - id: degraded
      value: "degraded"
      brief: >
        Operational but impaired (e.g. a TLOC up but with peers/BFD sessions down, or failing its SLA class).
      stability: development
    - id: unknown
      value: "unknown"
      brief: State cannot be determined.
      stability: development
  stability: development
  brief: >
    The operational state of the tunnel source endpoint.
  note: >
    The same coarse health vocabulary as `network.neighbor.state` / `network.link.state` (`up·down·degraded·unknown`). Per-peer / per-BFD-session liveness within a discovered mesh is a metric dimension, not this endpoint-level state. Open enum, lowercase.

- key: network.tunnel.native_state
  type: string
  stability: development
  brief: >
    The verbatim, vendor-native endpoint/tunnel state string.
  examples: ["up", "ipsec-down", "bfd-down", "admin-down"]
